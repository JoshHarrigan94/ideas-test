<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Raisin</title>

<style>
:root{
  --bg:#f6efe7;
  --card:#fffaf5;
  --outline:#2f2a28;
  --fur:#c58f57;
  --fur-dark:#9a6b3f;
  --cream:#e8d4bf;
  --nose:#2f2a28;
  --eye:#1f1f1f;
  --tongue:#ff8a8a;
  --green:#8bc7a1;
  --amber:#efb65f;
  --pink:#ff9aa2;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 50% 20%,#fffaf5 0%,#f6efe7 55%,#e9d9c7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:system-ui,sans-serif;
}

.app{
  width:min(760px,96vw);
}

.stage{
  aspect-ratio:1/1;
  background:var(--card);
  border-radius:36px;
  overflow:hidden;
  position:relative;
  box-shadow:0 24px 70px rgba(0,0,0,.10);
}

svg{
  width:100%;
  height:100%;
  display:block;
}

.label{
  position:absolute;
  top:20px;
  left:20px;
  font-weight:900;
  color:#5d524c;
}

.sub{
  position:absolute;
  top:48px;
  left:20px;
  color:#8a7b72;
  font-size:13px;
}

.stats{
  position:absolute;
  top:20px;
  right:20px;
  width:170px;
  display:grid;
  gap:8px;
}

.stat{
  background:rgba(255,255,255,.65);
  border:1px solid rgba(90,70,50,.08);
  border-radius:999px;
  padding:8px 10px;
  font-size:12px;
  color:#6b5b52;
}

.bar{
  height:7px;
  margin-top:5px;
  background:#eadbcc;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:50%;
  background:var(--fur);
  border-radius:999px;
  transition:width .35s ease;
}

.controls{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  border:0;
  background:#fffaf5;
  color:#5d524c;
  border-radius:18px;
  padding:14px 10px;
  font-weight:900;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
  cursor:pointer;
}

button:active{
  transform:scale(.97);
}

.hotspot{
  cursor:pointer;
  fill:transparent;
}

</style>
</head>

<body>

<div class="app">

<div class="stage">

<div class="label" id="moodLabel">Raisin • Awake</div>
<div class="sub" id="behaviourLabel">idle breathing</div>

<div class="stats">
  <div class="stat">Bond <div class="bar"><div class="fill" id="bondFill"></div></div></div>
  <div class="stat">Happy <div class="bar"><div class="fill" id="happyFill"></div></div></div>
  <div class="stat">Energy <div class="bar"><div class="fill" id="energyFill"></div></div></div>
  <div class="stat">Play <div class="bar"><div class="fill" id="stimFill"></div></div></div>
</div>

<svg viewBox="0 0 800 800">

  <ellipse id="shadow" cx="400" cy="620" rx="175" ry="38" fill="#000" opacity=".08"/>

  <g id="tailGroup">
    <path id="tail" d="M560 500 C650 430 680 380 660 330"
      fill="none" stroke="#9a6b3f" stroke-width="34" stroke-linecap="round"/>
  </g>

  <ellipse id="body" cx="400" cy="500" rx="170" ry="120" fill="#c58f57"/>
  <ellipse id="chest" cx="360" cy="530" rx="70" ry="70" fill="#e8d4bf"/>

  <ellipse id="leftPaw" cx="330" cy="605" rx="42" ry="26" fill="#9a6b3f"/>
  <ellipse id="rightPaw" cx="470" cy="605" rx="42" ry="26" fill="#9a6b3f"/>

  <g id="headGroup">

    <g id="leftEarGroup">
      <ellipse id="leftEar" cx="318" cy="325" rx="42" ry="102" fill="#9a6b3f"/>
    </g>

    <g id="rightEarGroup">
      <ellipse id="rightEar" cx="482" cy="325" rx="42" ry="102" fill="#9a6b3f"/>
    </g>

    <circle id="head" cx="400" cy="320" r="116" fill="#c58f57"/>

    <path d="M348 235 C378 212 426 212 452 238"
      fill="none" stroke="#d7a06a" stroke-width="20" stroke-linecap="round" opacity=".5"/>

    <g id="eyeGroup">
      <ellipse id="leftEye" cx="360" cy="305" rx="11" ry="17" fill="#1f1f1f"/>
      <ellipse id="rightEye" cx="440" cy="305" rx="11" ry="17" fill="#1f1f1f"/>
      <circle id="leftShine" cx="364" cy="299" r="3" fill="#fff" opacity=".85"/>
      <circle id="rightShine" cx="444" cy="299" r="3" fill="#fff" opacity=".85"/>
    </g>

    <ellipse id="muzzle" cx="400" cy="358" rx="58" ry="44" fill="#e8d4bf"/>
    <ellipse id="nose" cx="400" cy="346" rx="19" ry="13" fill="#2f2a28"/>

    <path id="mouth" d="M384 371 Q400 384 416 371"
      fill="none" stroke="#2f2a28" stroke-width="4" stroke-linecap="round"/>

    <path id="tongue" d="M392 378 Q400 402 408 378"
      fill="#ff8a8a" opacity="0"/>

  </g>

  <g id="hearts"></g>

  <circle class="hotspot" id="headHotspot" cx="400" cy="315" r="120"/>
  <circle class="hotspot" id="noseHotspot" cx="400" cy="350" r="36"/>
  <ellipse class="hotspot" id="leftEarHotspot" cx="318" cy="330" rx="60" ry="120"/>
  <ellipse class="hotspot" id="rightEarHotspot" cx="482" cy="330" rx="60" ry="120"/>

</svg>

</div>

<div class="controls">
  <button id="petBtn">Pet</button>
  <button id="boopBtn">Boop</button>
  <button id="treatBtn">Treat</button>
  <button id="napBtn">Nap</button>
</div>

</div>

<script>
const $ = id => document.getElementById(id);

const moodLabel = $("moodLabel");
const behaviourLabel = $("behaviourLabel");

const headGroup = $("headGroup");
const body = $("body");
const chest = $("chest");
const tailGroup = $("tailGroup");
const leftEye = $("leftEye");
const rightEye = $("rightEye");
const eyeGroup = $("eyeGroup");
const nose = $("nose");
const mouth = $("mouth");
const tongue = $("tongue");
const leftEarGroup = $("leftEarGroup");
const rightEarGroup = $("rightEarGroup");
const shadow = $("shadow");
const hearts = $("hearts");

const bondFill = $("bondFill");
const happyFill = $("happyFill");
const energyFill = $("energyFill");
const stimFill = $("stimFill");

let pet = JSON.parse(localStorage.getItem("raisinState") || "null") || {
  bond:35,
  happiness:62,
  energy:78,
  stimulation:45,
  pets:0,
  treats:0,
  boops:0,
  naps:0
};

let t = 0;
let mood = "idle";
let behaviour = "idle breathing";

let headTilt = 0;
let targetHeadTilt = 0;

let lookX = 0;
let targetLookX = 0;

let blink = 1;
let blinking = false;

let sniffPower = 0;
let tailEnergy = 1;
let bouncePower = 0;
let smilePower = 0;
let sleepPower = 0;
let boopPower = 0;

function save(){
  localStorage.setItem("raisinState", JSON.stringify(pet));
}

function clamp(v){
  return Math.max(0, Math.min(100, v));
}

function addStat(key, value){
  pet[key] = clamp(pet[key] + value);
  save();
  updateStats();
}

function updateStats(){
  bondFill.style.width = pet.bond + "%";
  happyFill.style.width = pet.happiness + "%";
  energyFill.style.width = pet.energy + "%";
  stimFill.style.width = pet.stimulation + "%";
}

function setMood(name, behaviourText){
  mood = name;
  moodLabel.textContent =
    name === "happy" ? "Raisin • Happy" :
    name === "excited" ? "Raisin • Excited" :
    name === "sleepy" ? "Raisin • Sleepy" :
    name === "curious" ? "Raisin • Curious" :
    "Raisin • Awake";

  behaviour = behaviourText;
  behaviourLabel.textContent = behaviourText;
}

function randomBetween(min,max){
  return min + Math.random() * (max - min);
}

function heart(x,y){
  const h = document.createElementNS("http://www.w3.org/2000/svg","path");
  h.setAttribute("d","M0 -10 C-20 -30 -42 -5 0 26 C42 -5 20 -30 0 -10Z");
  h.setAttribute("fill","#ff9aa2");
  h.setAttribute("opacity",".85");
  h.setAttribute("transform",`translate(${x} ${y}) scale(.45)`);
  hearts.appendChild(h);

  let life = 0;

  function rise(){
    life += 0.02;
    h.setAttribute("transform",`translate(${x} ${y - life * 120}) scale(${.45 + life * .2})`);
    h.setAttribute("opacity", .85 - life);

    if(life < .85) requestAnimationFrame(rise);
    else h.remove();
  }

  rise();
}

function scheduleBlink(){
  setTimeout(() => {
    if(mood !== "sleepy") doBlink();
    scheduleBlink();
  }, randomBetween(2500,8500));
}

function doBlink(){
  if(blinking) return;
  blinking = true;
  blink = 0.12;

  setTimeout(() => {
    blink = sleepPower > .5 ? 0.25 : 1;
    blinking = false;
  }, 140);
}

function scheduleCurious(){
  setTimeout(() => {
    if(mood === "idle") doCurious();
    scheduleCurious();
  }, randomBetween(6000,14000));
}

function doCurious(){
  setMood("curious","head tilt");
  targetHeadTilt = Math.random() > 0.5 ? 13 : -13;
  tailEnergy = 1.25;

  setTimeout(() => {
    targetHeadTilt = 0;
    setMood("idle","idle breathing");
    tailEnergy = 1;
  }, 1700);
}

function scheduleLook(){
  setTimeout(() => {
    if(mood !== "sleepy") doLookAround();
    scheduleLook();
  }, randomBetween(4000,9500));
}

function doLookAround(){
  behaviourLabel.textContent = "looking around";
  targetLookX = Math.random() > 0.5 ? 10 : -10;

  setTimeout(() => {
    targetLookX = 0;
    behaviourLabel.textContent = behaviour;
  }, 1200);
}

function scheduleSniff(){
  setTimeout(() => {
    if(mood !== "sleepy") doSniff();
    scheduleSniff();
  }, randomBetween(7000,15000));
}

function doSniff(){
  behaviourLabel.textContent = "sniff sniff";
  let sniffs = 0;

  const interval = setInterval(() => {
    sniffPower = 1;
    sniffs++;

    setTimeout(() => sniffPower = 0, 120);

    if(sniffs >= 3){
      clearInterval(interval);
      setTimeout(() => behaviourLabel.textContent = behaviour, 500);
    }
  }, 260);
}

function petHead(){
  pet.pets++;
  addStat("bond", 4);
  addStat("happiness", 5);
  addStat("stimulation", 2);

  setMood("happy","getting head pets");
  tailEnergy = 2.2;
  smilePower = 1;
  targetHeadTilt = -5;

  heart(365 + Math.random()*70, 210);

  setTimeout(() => {
    targetHeadTilt = 0;
    smilePower = 0;
    tailEnergy = 1;
    setMood("idle","idle breathing");
  }, 2200);
}

function boop(){
  pet.boops++;
  addStat("bond", 2);
  addStat("happiness", 2);
  addStat("stimulation", 4);

  setMood("curious","nose boop!");
  boopPower = 1;
  doBlink();
  targetHeadTilt = Math.random() > .5 ? 10 : -10;

  setTimeout(() => boopPower = 0, 220);

  setTimeout(() => {
    targetHeadTilt = 0;
    setMood("idle","idle breathing");
  }, 1400);
}

function treat(){
  pet.treats++;
  addStat("bond", 5);
  addStat("happiness", 9);
  addStat("energy", 5);
  addStat("stimulation", 8);

  setMood("excited","treat detected");
  tailEnergy = 3.4;
  bouncePower = 1;
  smilePower = 1;

  heart(385,220);
  heart(430,230);

  setTimeout(() => bouncePower = 0, 900);

  setTimeout(() => {
    tailEnergy = 1.4;
    smilePower = .5;
    setMood("happy","happy after treat");
  }, 1200);

  setTimeout(() => {
    tailEnergy = 1;
    smilePower = 0;
    setMood("idle","idle breathing");
  }, 4200);
}

function nap(){
  pet.naps++;
  addStat("energy", 15);
  addStat("happiness", 3);
  pet.stimulation = clamp(pet.stimulation - 10);

  setMood("sleepy","little nap");
  sleepPower = 1;
  tailEnergy = .25;
  targetHeadTilt = 0;

  setTimeout(() => {
    sleepPower = 0;
    tailEnergy = 1;
    setMood("idle","awake again");
  }, 5000);

  updateStats();
  save();
}

$("petBtn").onclick = petHead;
$("boopBtn").onclick = boop;
$("treatBtn").onclick = treat;
$("napBtn").onclick = nap;

$("headHotspot").onclick = petHead;
$("noseHotspot").onclick = boop;
$("leftEarHotspot").onclick = petHead;
$("rightEarHotspot").onclick = petHead;

function decay(){
  pet.happiness = clamp(pet.happiness - .6);
  pet.energy = clamp(pet.energy - .3);
  pet.stimulation = clamp(pet.stimulation - .4);
  updateStats();
  save();
}

setInterval(decay, 12000);

function animate(){
  t += 0.03;

  const breathe =
    Math.sin(t * (sleepPower ? .45 : 1)) * (sleepPower ? 2 : 4);

  const bounce =
    Math.abs(Math.sin(t * 10)) * 18 * bouncePower;

  headTilt += (targetHeadTilt - headTilt) * 0.06;
  lookX += (targetLookX - lookX) * 0.08;

  const sniff = sniffPower * Math.sin(t * 24) * 3;
  const boopMove = boopPower * -18;

  body.setAttribute("cy", 500 + breathe - bounce);
  chest.setAttribute("cy", 530 + breathe * 1.1 - bounce);
  shadow.setAttribute("rx", 175 + breathe * 1.2 - bounce * .8);

  headGroup.setAttribute(
    "transform",
    `
    translate(${lookX * .45} ${breathe * .55 + sniff - bounce + boopMove})
    rotate(${headTilt} 400 340)
    `
  );

  const earLag = headTilt * -0.35;
  const sleepyDrop = sleepPower * 10;

  leftEarGroup.setAttribute("transform",`rotate(${earLag - 2 - sleepyDrop} 318 260)`);
  rightEarGroup.setAttribute("transform",`rotate(${earLag + 2 + sleepyDrop} 482 260)`);

  const wag = Math.sin(t * 3.2) * 12 * tailEnergy;

  tailGroup.setAttribute("transform",`rotate(${wag} 560 500)`);

  const targetBlink = sleepPower ? 0.18 : blink;
  leftEye.setAttribute("ry", 17 * targetBlink);
  rightEye.setAttribute("ry", 17 * targetBlink);

  eyeGroup.setAttribute("transform",`translate(${lookX * .35} 0)`);

  nose.setAttribute(
    "transform",
    `translate(0 ${sniff * .7}) scale(${1 + sniffPower * .05 + boopPower * .08})`
  );

  if(sleepPower){
    mouth.setAttribute("d","M385 371 Q400 374 415 371");
    tongue.setAttribute("opacity","0");
  }else if(smilePower){
    mouth.setAttribute("d","M378 367 Q400 397 422 367");
    tongue.setAttribute("opacity", mood === "excited" ? ".8" : ".25");
  }else if(mood === "curious"){
    mouth.setAttribute("d","M386 371 Q400 378 414 371");
    tongue.setAttribute("opacity","0");
  }else{
    mouth.setAttribute("d","M384 371 Q400 384 416 371");
    tongue.setAttribute("opacity","0");
  }

  requestAnimationFrame(animate);
}

updateStats();
scheduleBlink();
scheduleCurious();
scheduleLook();
scheduleSniff();
animate();
</script>

</body>
</html>
