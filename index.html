<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Living Intelligence</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#020406;
}

canvas{
display:block;
width:100vw;
height:100vh;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = innerWidth;
canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

const mouse = {
x:innerWidth/2,
y:innerHeight/2
};

addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

const particles = [];

const COUNT = 800;

for(let i=0;i<COUNT;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5,

size:Math.random()*2+0.5,

phase:Math.random()*Math.PI*2

});

}

let time = 0;

function animate(){

requestAnimationFrame(animate);

time += 0.01;

ctx.fillStyle="rgba(2,4,6,0.12)";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){

const p = particles[i];

const dx = mouse.x - p.x;
const dy = mouse.y - p.y;

const dist = Math.hypot(dx,dy);

if(dist < 250){

const force = (250-dist)/250;

p.vx += dx*0.00008*force;
p.vy += dy*0.00008*force;

}

p.x += p.vx;
p.y += p.vy;

p.vx *= 0.992;
p.vy *= 0.992;

p.x += Math.sin(time+p.phase)*0.15;
p.y += Math.cos(time+p.phase)*0.15;

if(p.x<0)p.x=canvas.width;
if(p.x>canvas.width)p.x=0;

if(p.y<0)p.y=canvas.height;
if(p.y>canvas.height)p.y=0;

}

for(let i=0;i<particles.length;i++){

const a = particles[i];

for(let j=i+1;j<particles.length;j++){

const b = particles[j];

const dx = a.x-b.x;
const dy = a.y-b.y;

const d2 = dx*dx + dy*dy;

if(d2 < 6400){

const alpha = 1-(d2/6400);

ctx.beginPath();

ctx.strokeStyle=
`rgba(180,220,255,${alpha*0.15})`;

ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);

ctx.stroke();

}

}

}

for(const p of particles){

const pulse =
1.5 +
Math.sin(time*4+p.phase)*1.5;

ctx.beginPath();

ctx.fillStyle=
`rgba(220,240,255,0.9)`;

ctx.arc(
p.x,
p.y,
p.size + pulse*0.3,
0,
Math.PI*2
);

ctx.fill();

}

const gradient = ctx.createRadialGradient(
mouse.x,
mouse.y,
0,
mouse.x,
mouse.y,
350
);

gradient.addColorStop(0,"rgba(120,200,255,0.12)");
gradient.addColorStop(1,"rgba(120,200,255,0)");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

}

animate();

</script>

</body>
</html>
