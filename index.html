<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Living Heart Data Art</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% 40%, #142235 0%, #07111f 48%, #03070d 100%);
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: white;
  }

  canvas {
    width: 100vw;
    height: 100vh;
    display: block;
  }

  .hud {
    position: fixed;
    left: 24px;
    top: 24px;
    padding: 18px 20px;
    width: 260px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(5, 12, 22, .55);
    backdrop-filter: blur(14px);
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #8fb7ff;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 14px;
  }

  .metric {
    display: flex;
    justify-content: space-between;
    margin: 9px 0;
    color: rgba(255,255,255,.72);
    font-size: 13px;
  }

  .metric strong {
    color: white;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <aside class="hud">
    <div class="eyebrow">Data Art Simulation</div>
    <h1>Cardiac Flow</h1>
    <div class="metric"><span>Heart rate</span><strong id="hr">72 bpm</strong></div>
    <div class="metric"><span>Stroke volume</span><strong id="sv">70 ml</strong></div>
    <div class="metric"><span>Cardiac output</span><strong id="co">5.0 L/min</strong></div>
    <div class="metric"><span>Oxygenation</span><strong id="oxy">98%</strong></div>
  </aside>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const hrEl = document.getElementById("hr");
const svEl = document.getElementById("sv");
const coEl = document.getElementById("co");
const oxyEl = document.getElementById("oxy");

let w, h, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = canvas.width = innerWidth * dpr;
  h = canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  w = innerWidth;
  h = innerHeight;
}
resize();
addEventListener("resize", resize);

const particles = [];
const flowPaths = [];

const state = {
  bpm: 72,
  strokeVolume: 70,
  oxygen: 98,
  time: 0,
  beatPhase: 0,
  beatStrength: 0
};

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function pulseCurve(x) {
  return Math.pow(Math.sin(Math.PI * x), 3);
}

function heartPoint(t, scale = 1) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y =
    13 * Math.cos(t) -
    5 * Math.cos(2 * t) -
    2 * Math.cos(3 * t) -
    Math.cos(4 * t);

  return {
    x: x * scale,
    y: -y * scale
  };
}

function makePath(points, type) {
  flowPaths.push({ points, type });
}

function rebuildPaths() {
  flowPaths.length = 0;

  const cx = w * 0.55;
  const cy = h * 0.53;
  const s = Math.min(w, h) * 0.018;

  makePath([
    { x: cx - 260, y: cy - 170 },
    { x: cx - 160, y: cy - 120 },
    { x: cx - 95, y: cy - 35 },
    { x: cx - 55, y: cy + 80 }
  ], "venous");

  makePath([
    { x: cx - 45, y: cy + 80 },
    { x: cx + 20, y: cy + 30 },
    { x: cx + 60, y: cy - 70 },
    { x: cx + 210, y: cy - 165 }
  ], "pulmonary");

  makePath([
    { x: cx + 175, y: cy - 125 },
    { x: cx + 85, y: cy - 65 },
    { x: cx + 40, y: cy + 70 },
    { x: cx + 10, y: cy + 160 }
  ], "oxygenatedIn");

  makePath([
    { x: cx + 12, y: cy + 130 },
    { x: cx + 85, y: cy + 35 },
    { x: cx + 125, y: cy - 120 },
    { x: cx + 75, y: cy - 245 },
    { x: cx - 50, y: cy - 255 }
  ], "arterial");
}

function samplePath(path, t) {
  const pts = path.points;
  const total = pts.length - 1;
  const raw = t * total;
  const i = Math.min(Math.floor(raw), total - 1);
  const local = raw - i;

  const a = pts[i];
  const b = pts[i + 1];

  return {
    x: lerp(a.x, b.x, local),
    y: lerp(a.y, b.y, local)
  };
}

function spawnParticle(type) {
  const path = flowPaths.find(p => p.type === type);
  if (!path) return;

  particles.push({
    path,
    t: 0,
    speed: type === "arterial" ? 0.012 : 0.008,
    size: Math.random() * 2.4 + 1.6,
    offset: (Math.random() - 0.5) * 16,
    life: 1,
    spin: Math.random() * Math.PI * 2
  });
}

function drawHeart(cx, cy, scale, beat) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale * (1 + beat * 0.035), scale * (1 - beat * 0.018));

  const grad = ctx.createRadialGradient(-40, -30, 20, 0, 20, 260);
  grad.addColorStop(0, "rgba(255, 110, 95, .95)");
  grad.addColorStop(.45, "rgba(155, 25, 45, .92)");
  grad.addColorStop(1, "rgba(52, 8, 22, .98)");

  ctx.beginPath();
  for (let i = 0; i <= 360; i++) {
    const t = (i / 360) * Math.PI * 2;
    const p = heartPoint(t, 13);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.shadowColor = "rgba(255, 50, 70, .5)";
  ctx.shadowBlur = 40 + beat * 40;
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = "rgba(255,255,255,.14)";
  ctx.stroke();

  // chamber hints
  ctx.globalCompositeOperation = "screen";
  ctx.strokeStyle = "rgba(255,170,170,.18)";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.ellipse(-58, -8, 52, 95, -0.2, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(48, 14, 62, 120, 0.18, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-8, -105);
  ctx.bezierCurveTo(-22, -35, -18, 45, -4, 132);
  ctx.stroke();

  ctx.restore();
}

function drawVessels(beat) {
  for (const path of flowPaths) {
    ctx.beginPath();
    path.points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });

    const isBlue = path.type === "venous" || path.type === "pulmonary";
    ctx.lineWidth = path.type === "arterial" ? 22 + beat * 7 : 15 + beat * 3;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = isBlue
      ? "rgba(50, 130, 255, .22)"
      : "rgba(255, 45, 50, .26)";
    ctx.stroke();

    ctx.lineWidth *= .42;
    ctx.strokeStyle = isBlue
      ? "rgba(110, 190, 255, .35)"
      : "rgba(255, 120, 95, .42)";
    ctx.stroke();
  }
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed * (1 + state.beatStrength * 1.9);

    if (p.t >= 1) {
      particles.splice(i, 1);
      continue;
    }

    const pos = samplePath(p.path, p.t);
    const wave = Math.sin(p.t * Math.PI * 8 + p.spin) * p.offset;

    const isBlue = p.path.type === "venous" || p.path.type === "pulmonary";
    const r = p.size * (1 + state.beatStrength * 1.2);

    ctx.beginPath();
    ctx.arc(pos.x + wave * 0.18, pos.y + wave * 0.18, r, 0, Math.PI * 2);

    ctx.fillStyle = isBlue
      ? `rgba(80, 170, 255, ${0.35 + p.life * .45})`
      : `rgba(255, 55, 45, ${0.36 + p.life * .5})`;

    ctx.shadowColor = isBlue ? "#4aaaff" : "#ff3d2f";
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawBackground(time) {
  ctx.clearRect(0, 0, w, h);

  const cx = w * 0.55;
  const cy = h * 0.52;

  const grad = ctx.createRadialGradient(cx, cy, 40, cx, cy, Math.max(w, h) * .7);
  grad.addColorStop(0, "rgba(80, 20, 45, .28)");
  grad.addColorStop(.45, "rgba(8, 20, 36, .64)");
  grad.addColorStop(1, "rgba(2, 5, 10, 1)");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // faint data grid
  ctx.strokeStyle = "rgba(255,255,255,.035)";
  ctx.lineWidth = 1;

  for (let x = 0; x < w; x += 48) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }

  for (let y = 0; y < h; y += 48) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
}

function drawECG(time, beat) {
  const baseY = h - 90;
  const startX = 60;
  const width = w - 120;

  ctx.save();
  ctx.strokeStyle = "rgba(125, 210, 255, .55)";
  ctx.lineWidth = 2;
  ctx.shadowColor = "#7dd2ff";
  ctx.shadowBlur = 12;

  ctx.beginPath();

  for (let i = 0; i < width; i++) {
    const x = startX + i;
    const u = (i / width) * 5 + time * 1.8;
    const phase = u % 1;

    let y = baseY + Math.sin(u * Math.PI * 2) * 4;

    if (phase > .18 && phase < .22) y -= 10;
    if (phase > .235 && phase < .255) y += 18;
    if (phase > .255 && phase < .275) y -= 42;
    if (phase > .275 && phase < .305) y += 16;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.stroke();
  ctx.restore();
}

function updateMetrics(time) {
  state.bpm = Math.round(72 + Math.sin(time * .35) * 7 + state.beatStrength * 5);
  state.strokeVolume = Math.round(70 + Math.sin(time * .23) * 5);
  state.oxygen = Math.round(97 + Math.sin(time * .18) * 1);

  const co = (state.bpm * state.strokeVolume / 1000).toFixed(1);

  hrEl.textContent = `${state.bpm} bpm`;
  svEl.textContent = `${state.strokeVolume} ml`;
  coEl.textContent = `${co} L/min`;
  oxyEl.textContent = `${state.oxygen}%`;
}

function animate() {
  requestAnimationFrame(animate);

  state.time += 0.016;

  const secondsPerBeat = 60 / state.bpm;
  state.beatPhase = (state.time % secondsPerBeat) / secondsPerBeat;
  state.beatStrength = pulseCurve(state.beatPhase);

  rebuildPaths();

  const spawnRate = 4 + state.beatStrength * 18;

  for (let i = 0; i < spawnRate; i++) {
    if (Math.random() < .28) spawnParticle("venous");
    if (Math.random() < .20) spawnParticle("pulmonary");
    if (Math.random() < .24) spawnParticle("oxygenatedIn");
    if (Math.random() < .30) spawnParticle("arterial");
  }

  drawBackground(state.time);
  drawVessels(state.beatStrength);
  drawHeart(w * .55, h * .53, Math.min(w, h) * .0062, state.beatStrength);
  drawParticles();
  drawECG(state.time, state.beatStrength);
  updateMetrics(state.time);
}

animate();
</script>
</body>
</html>
