<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebGPU Living Nebula</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#03050a;color:white;font-family:Inter,system-ui}
    canvas{width:100vw;height:100vh;display:block}
    .hud{position:fixed;left:24px;top:22px;padding:14px 16px;border:1px solid #ffffff22;
      background:#050914aa;backdrop-filter:blur(16px);border-radius:16px}
    .hud b{letter-spacing:.16em;font-size:12px}
    .hud p{margin:.35rem 0 0;color:#9fb3c8;font-size:13px}
  </style>
</head>
<body>
<canvas></canvas>
<div class="hud"><b>WEBGPU NEBULA</b><p>Move mouse • click to collapse gravity</p></div>

<script type="module">
const canvas = document.querySelector("canvas");

if (!navigator.gpu) {
  document.body.innerHTML = "<h1 style='padding:2rem'>WebGPU not available. Use Chrome/Edge desktop.</h1>";
  throw new Error("No WebGPU");
}

const adapter = await navigator.gpu.requestAdapter();
const device = await adapter.requestDevice();
const ctx = canvas.getContext("webgpu");
const format = navigator.gpu.getPreferredCanvasFormat();

ctx.configure({
  device,
  format,
  alphaMode: "opaque"
});

let W = 0, H = 0, DPR = Math.min(devicePixelRatio, 2);

function resize() {
  W = innerWidth * DPR;
  H = innerHeight * DPR;
  canvas.width = W;
  canvas.height = H;
}
resize();
addEventListener("resize", resize);

const COUNT = 90000;
const WORKGROUP = 256;

const particleData = new Float32Array(COUNT * 8);

for (let i = 0; i < COUNT; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.pow(Math.random(), 0.45) * 0.85;
  const x = Math.cos(a) * r;
  const y = Math.sin(a) * r;

  particleData.set([
    x, y,
    -y * 0.0015, x * 0.0015,
    Math.random(),
    Math.random(),
    0,
    0
  ], i * 8);
}

const particleBuffer = device.createBuffer({
  size: particleData.byteLength,
  usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
  mappedAtCreation: true
});
new Float32Array(particleBuffer.getMappedRange()).set(particleData);
particleBuffer.unmap();

const uniformBuffer = device.createBuffer({
  size: 64,
  usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
});

let mouse = { x: 0, y: 0, down: 0 };

addEventListener("pointermove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -((e.clientY / innerHeight) * 2 - 1);
});
addEventListener("pointerdown", () => mouse.down = 1);
addEventListener("pointerup", () => mouse.down = 0);

const computeCode = `
struct Particle {
  pos: vec2<f32>,
  vel: vec2<f32>,
  seed: vec2<f32>,
  pad: vec2<f32>
};

struct Uniforms {
  time: f32,
  dt: f32,
  aspect: f32,
  mouseDown: f32,
  mouse: vec2<f32>,
  resolution: vec2<f32>
};

@group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
@group(0) @binding(1) var<uniform> u: Uniforms;

fn swirl(p: vec2<f32>, t: f32) -> vec2<f32> {
  let a = atan2(p.y, p.x);
  let r = length(p);
  let wave = sin(a * 5.0 + t * 0.7) + cos(r * 12.0 - t);
  return vec2<f32>(-p.y, p.x) * (0.07 + 0.03 * wave);
}

@compute @workgroup_size(${WORKGROUP})
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
  let i = id.x;
  if (i >= ${COUNT}u) { return; }

  var p = particles[i];
  var pos = p.pos;
  var vel = p.vel;

  let centreForce = -pos * 0.018;
  let swirlForce = swirl(pos, u.time);
  let m = u.mouse;
  let toMouse = m - pos;
  let d = max(length(toMouse), 0.03);
  let mouseForce = normalize(toMouse) * (0.035 / (d * d)) * (0.25 + u.mouseDown * 2.5);

  let n = vec2<f32>(
    sin(p.seed.x * 400.0 + u.time + pos.y * 8.0),
    cos(p.seed.y * 500.0 - u.time + pos.x * 8.0)
  ) * 0.002;

  vel += centreForce + swirlForce + mouseForce + n;
  vel *= 0.982;
  pos += vel * u.dt * 60.0;

  if (length(pos) > 1.55) {
    pos *= -0.25;
    vel *= 0.15;
  }

  p.pos = pos;
  p.vel = vel;
  particles[i] = p;
}
`;

const renderCode = `
struct Particle {
  pos: vec2<f32>,
  vel: vec2<f32>,
  seed: vec2<f32>,
  pad: vec2<f32>
};

struct Uniforms {
  time: f32,
  dt: f32,
  aspect: f32,
  mouseDown: f32,
  mouse: vec2<f32>,
  resolution: vec2<f32>
};

@group(0) @binding(0) var<storage, read> particles: array<Particle>;
@group(0) @binding(1) var<uniform> u: Uniforms;

struct VSOut {
  @builtin(position) pos: vec4<f32>,
  @location(0) col: vec4<f32>
};

@vertex
fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
  let p = particles[vi];
  let speed = length(p.vel) * 120.0;
  let r = length(p.pos);

  var out: VSOut;
  out.pos = vec4<f32>(p.pos.x / max(u.aspect, 0.001), p.pos.y, 0.0, 1.0);

  let cyan = vec3<f32>(0.08, 0.8, 1.0);
  let violet = vec3<f32>(0.75, 0.25, 1.0);
  let ember = vec3<f32>(1.0, 0.42, 0.12);

  let mixA = 0.5 + 0.5 * sin(p.seed.x * 12.0 + u.time * 0.4);
  let base = mix(cyan, violet, mixA);
  let hot = mix(base, ember, smoothstep(0.25, 1.8, speed));

  out.col = vec4<f32>(hot * (0.45 + speed), 0.055 + 0.08 * (1.0 - r));
  return out;
}

@fragment
fn fs(in: VSOut) -> @location(0) vec4<f32> {
  return in.col;
}
`;

const computePipeline = device.createComputePipeline({
  layout: "auto",
  compute: {
    module: device.createShaderModule({ code: computeCode }),
    entryPoint: "main"
  }
});

const renderPipeline = device.createRenderPipeline({
  layout: "auto",
  vertex: {
    module: device.createShaderModule({ code: renderCode }),
    entryPoint: "vs"
  },
  fragment: {
    module: device.createShaderModule({ code: renderCode }),
    entryPoint: "fs",
    targets: [{
      format,
      blend: {
        color: { srcFactor: "src-alpha", dstFactor: "one", operation: "add" },
        alpha: { srcFactor: "one", dstFactor: "one-minus-src-alpha", operation: "add" }
      }
    }]
  },
  primitive: { topology: "point-list" }
});

const bindGroup = device.createBindGroup({
  layout: computePipeline.getBindGroupLayout(0),
  entries: [
    { binding: 0, resource: { buffer: particleBuffer } },
    { binding: 1, resource: { buffer: uniformBuffer } }
  ]
});

let last = performance.now();

function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.033);
  last = now;

  const uniforms = new Float32Array([
    now / 1000,
    dt,
    W / H,
    mouse.down,
    mouse.x * (W / H),
    mouse.y,
    W,
    H,
    0,0,0,0,0,0,0,0
  ]);
  device.queue.writeBuffer(uniformBuffer, 0, uniforms);

  const encoder = device.createCommandEncoder();

  const compute = encoder.beginComputePass();
  compute.setPipeline(computePipeline);
  compute.setBindGroup(0, bindGroup);
  compute.dispatchWorkgroups(Math.ceil(COUNT / WORKGROUP));
  compute.end();

  const view = ctx.getCurrentTexture().createView();

  const pass = encoder.beginRenderPass({
    colorAttachments: [{
      view,
      clearValue: { r: 0.01, g: 0.015, b: 0.028, a: 1 },
      loadOp: "clear",
      storeOp: "store"
    }]
  });

  pass.setPipeline(renderPipeline);
  pass.setBindGroup(0, bindGroup);
  pass.draw(COUNT);
  pass.end();

  device.queue.submit([encoder.finish()]);
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
