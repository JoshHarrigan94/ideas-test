<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BETTER OS — Living Athlete Interface</title>

<style>
:root{
  --bg-0:#03070d;
  --bg-1:#07131f;
  --bg-2:#0e2234;
  --navy:#102a43;
  --navy-2:#163853;
  --steel:#8ea4b5;
  --steel-2:#c9d5dd;
  --warm:#f7f0e8;
  --warm-2:#fff7ef;
  --coral:#ff735f;
  --coral-2:#ffb19c;
  --mint:#9ee6c9;
  --amber:#ffd28a;
  --danger:#ff5d6c;
  --glass:rgba(255,255,255,.08);
  --glass-2:rgba(255,255,255,.14);
  --line:rgba(255,255,255,.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
  background:var(--bg-0);
  color:var(--warm);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  overflow:hidden;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,115,95,.18), transparent 28%),
    radial-gradient(circle at 18% 20%, rgba(158,230,201,.10), transparent 28%),
    radial-gradient(circle at 80% 70%, rgba(255,177,156,.10), transparent 32%),
    linear-gradient(145deg,#040912 0%,#081726 44%,#02050a 100%);
}

.app-shell{
  width:min(1440px,100vw);
  height:min(920px,100vh);
  position:relative;
  padding:18px;
}

.scene{
  width:100%;
  height:100%;
  display:block;
  border-radius:34px;
  filter:drop-shadow(0 40px 90px rgba(0,0,0,.55));
}

.mode-dock{
  position:absolute;
  z-index:20;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  padding:8px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  background:rgba(3,7,13,.62);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}

.mode-btn{
  appearance:none;
  border:0;
  color:rgba(247,240,232,.72);
  background:transparent;
  border-radius:999px;
  padding:11px 15px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.12em;
  cursor:pointer;
  transition:.25s ease;
}

.mode-btn:hover{
  color:white;
  background:rgba(255,255,255,.08);
}

.mode-btn.active{
  color:#07131f;
  background:linear-gradient(135deg,var(--coral),var(--coral-2));
  box-shadow:0 0 28px rgba(255,115,95,.35);
}

.hint{
  position:absolute;
  top:28px;
  right:32px;
  z-index:20;
  color:rgba(247,240,232,.48);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  pointer-events:none;
}

@media(max-width:760px){
  .app-shell{
    height:100vh;
    padding:8px;
  }

  .mode-dock{
    width:calc(100vw - 24px);
    overflow:auto;
    justify-content:flex-start;
    bottom:16px;
  }

  .mode-btn{
    white-space:nowrap;
    padding:10px 13px;
    font-size:11px;
  }

  .hint{
    display:none;
  }
}
</style>
</head>

function make(tag, attrs = {}, parent){
  const node = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([key,value]) => node.setAttribute(key,value));
  if(parent) parent.appendChild(node);
  return node;
}

function lerp(a,b,t){
  return a + (b - a) * t;
}

function clamp(v,min,max){
  return Math.max(min, Math.min(max, v));
}

function polar(cx,cy,r,angle){
  return {
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r
  };
}

function buildStars(){
  for(let i = 0; i < 140; i++){
    const x = Math.random() * 1440;
    const y = Math.random() * 920;
    const r = Math.random() * 1.8 + 0.4;
    const o = Math.random() * 0.4 + 0.08;
    const c = make("circle", {
      cx:x,
      cy:y,
      r:r,
      fill:"#ffffff",
      opacity:o
    }, els.starField);
    c.dataset.phase = Math.random() * Math.PI * 2;
    c.dataset.base = o;
  }
}

function buildBars(){
  for(let i = 0; i < 11; i++){
    make("rect", {
      x:i * 22,
      y:Math.random() * 16,
      width:12,
      height:10 + Math.random() * 28,
      rx:6,
      fill:i % 3 === 0 ? "#ff735f" : "#ffffff",
      opacity:i % 3 === 0 ? ".9" : ".34"
    }, els.adaptBars);
  }

  for(let i = 0; i < 28; i++){
    const h = 8 + Math.random() * 28;
    make("rect", {
      x:i * 18,
      y:22 - h / 2,
      width:9,
      height:h,
      rx:5,
      fill:i > 19 ? "#ff735f" : "#ffffff",
      opacity:i > 19 ? ".9" : ".24"
    }, els.timelineBars);
  }
}

const nodes = [];
function buildSignalNodes(){
  const nodeData = [
    [458,256,"SRA"],[982,330,"HRV"],[436,640,"LOAD"],[1002,626,"CNS"],
    [720,214,"VO₂"],[720,708,"POWER"],[548,378,"TENDON"],[892,494,"SKILL"],
    [586,574,"ROM"],[846,296,"SLEEP"]
  ];

  nodeData.forEach((d,i) => {
    const g = make("g", { transform:`translate(${d[0]} ${d[1]})`, opacity:".92" }, els.nodeLayer);
    make("circle", { r:28, fill:"url(#glassGrad)", stroke:"#ffffff", "stroke-opacity":".18" }, g);
    make("circle", { r:4, fill:i % 2 ? "#9ee6c9" : "#ff735f" }, g);
    const text = make("text", {
      x:0,
      y:48,
      "text-anchor":"middle",
      fill:"#c9d5dd",
      "font-family":"Inter, Arial",
      "font-size":10,
      "font-weight":800,
      "letter-spacing":2,
      opacity:.75
    }, g);
    text.textContent = d[2];
    nodes.push({ g, x:d[0], y:d[1], phase:Math.random() * Math.PI * 2, amp:4 + Math.random() * 8 });
  });
}

const particles = [];
function buildParticles(){
  const paths = ["signalPathA","signalPathB","signalPathC"];

  for(let i = 0; i < 34; i++){
    const pathId = paths[i % paths.length];
    const c = make("circle", {
      r:i % 3 === 0 ? 4 : 2.5,
      fill:i % 3 === 0 ? "#ff735f" : i % 3 === 1 ? "#ffffff" : "#9ee6c9",
      opacity:".8"
    }, els.particleLayer);

    particles.push({
      el:c,
      path:document.getElementById(pathId),
      speed:0.0007 + Math.random() * 0.0016,
      progress:Math.random(),
      offset:Math.random() * 1000
    });
  }
}

function setMode(mode){
  state.mode = mode;
  const m = modes[mode];

  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === mode);
  });

  els.loadLabel.textContent = m.load;
  els.recoveryLabel.textContent = m.recovery;
  els.outputLabel.textContent = m.output;
  els.actionText.textContent = m.action;
  els.stateText.textContent = m.system;

  els.bodySignalA.setAttribute("stroke", m.accent);
  els.bodySignalB.setAttribute("stroke", m.secondary);
  els.recoveryBar.setAttribute("fill", m.accent);
  els.outputLabel.setAttribute("fill", "#ffffff");
}

document.getElementById("modeDock").addEventListener("click", e => {
  const btn = e.target.closest(".mode-btn");
  if(!btn) return;
  setMode(btn.dataset.mode);
});

window.addEventListener("pointermove", e => {
  state.pointerX = e.clientX / window.innerWidth;
  state.pointerY = e.clientY / window.innerHeight;
});

function updateMetrics(){
  const m = modes[state.mode];
  const pulse = Math.sin(state.t * 0.0017);
  const micro = Math.sin(state.t * 0.0043) * 0.8;

  state.metrics.readiness = lerp(state.metrics.readiness, m.score + pulse * 1.4, 0.035);
  state.metrics.confidence = lerp(state.metrics.confidence, m.confidence + micro * 0.12, 0.035);
  state.metrics.recoveryDebt = lerp(state.metrics.recoveryDebt, m.recoveryDebt + pulse * 2.5, 0.035);
  state.metrics.adaptation = lerp(state.metrics.adaptation, m.adaptation + micro * 0.25, 0.035);

  els.scoreText.textContent = Math.round(state.metrics.readiness);
  els.confidenceText.textContent = state.metrics.confidence.toFixed(1) + "%";
  els.adaptText.textContent = "+" + state.metrics.adaptation.toFixed(1) + "%";

  const ring = 792;
  const scoreRatio = clamp(state.metrics.readiness / 100, 0, 1);
  els.readinessRing.setAttribute("stroke-dasharray", `${ring * scoreRatio} ${ring}`);

  els.confidenceBar.setAttribute("width", 190 * clamp(state.metrics.confidence / 100, 0, 1));
  els.recoveryBar.setAttribute("width", 220 * clamp(state.metrics.recoveryDebt / 100, 0, 1));
}

function animateScene(time){
  state.t = time;

  const px = (state.pointerX - 0.5);
  const py = (state.pointerY - 0.5);

  els.rotorA.setAttribute("transform", `rotate(${time * 0.012} 720 460)`);
  els.rotorB.setAttribute("transform", `rotate(${-time * 0.009} 720 460)`);
  els.rotorC.setAttribute("transform", `rotate(${time * 0.017} 720 460)`);

  els.parallaxBackdrop.setAttribute("transform", `translate(${px * 18} ${py * 12})`);

  const scanY = -160 + ((time * 0.13) % 1040);
  els.scanBeam.setAttribute("y", scanY);
  els.bodyScan.setAttribute("y", 230 + ((time * 0.07) % 430));

  document.querySelectorAll(".dashLine").forEach((line,i) => {
    const direction = line.classList.contains("reverseDash") ? 1 : -1;
    const speed = line.classList.contains("slowDash") ? 0.045 : 0.075;
    line.setAttribute("stroke-dashoffset", direction * time * speed + i * 40);
  });

  nodes.forEach(n => {
    const y = n.y + Math.sin(time * 0.0015 + n.phase) * n.amp;
    const x = n.x + Math.cos(time * 0.0012 + n.phase) * n.amp * 0.55;
    n.g.setAttribute("transform", `translate(${x} ${y})`);
  });

  particles.forEach(p => {
    const len = p.path.getTotalLength();
    p.progress = (p.progress + p.speed) % 1;
    const point = p.path.getPointAtLength(p.progress * len);
    const flicker = 0.4 + Math.sin(time * 0.006 + p.offset) * 0.25 + 0.35;
    p.el.setAttribute("cx", point.x);
    p.el.setAttribute("cy", point.y);
    p.el.setAttribute("opacity", clamp(flicker, 0.16, 0.92));
  });

  els.starField.querySelectorAll("circle").forEach((s,i) => {
    const base = Number(s.dataset.base);
    const phase = Number(s.dataset.phase);
    s.setAttribute("opacity", base + Math.sin(time * 0.0018 + phase) * 0.08);
  });

  document.querySelectorAll(".metricPanel").forEach((panel,i) => {
    const bob = Math.sin(time * 0.0012 + i) * 4;
    const current = panel.getAttribute("transform");
    const match = current.match(/translate\(([-\d.]+) ([-\d.]+)\)/);
    if(match){
      const x = Number(match[1]);
      const baseY = [258,432,606,258,432,606][i] || Number(match[2]);
      panel.setAttribute("transform", `translate(${x} ${baseY + bob})`);
    }
  });

  updateMetrics();
  requestAnimationFrame(animateScene);
}

buildStars();
buildBars();
buildSignalNodes();
buildParticles();
setMode("readiness");
requestAnimationFrame(animateScene);
</script>

</body>
</html>
