<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WebGL Singularity</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#02030a;font-family:Inter,system-ui}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
.hud{position:fixed;left:16px;top:16px;color:#dcecff;background:rgba(4,8,18,.45);
border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(14px);border-radius:18px;
padding:14px 16px;box-shadow:0 20px 70px #0008}
.hud b{font-size:12px;letter-spacing:.18em}
.hud p{margin:6px 0 0;color:#8fa6bd;font-size:13px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><b>WEBGL SINGULARITY</b><p>Touch / drag to bend the nebula</p></div>

<script>
const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl", {antialias:false, alpha:false, powerPreference:"high-performance"});
if(!gl){document.body.innerHTML="<h2 style='color:white;padding:24px'>WebGL unavailable</h2>";throw 0;}

const vert = `
attribute vec2 p;
void main(){gl_Position=vec4(p,0.,1.);}
`;

const frag = `
precision highp float;

uniform vec2 r;
uniform vec2 m;
uniform float t;
uniform float down;

#define PI 3.14159265359

mat2 rot(float a){
  float s=sin(a), c=cos(a);
  return mat2(c,-s,s,c);
}

float hash(vec2 p){
  p=fract(p*vec2(123.34,456.21));
  p+=dot(p,p+45.32);
  return fract(p.x*p.y);
}

float noise(vec3 p){
  vec3 i=floor(p), f=fract(p);
  f=f*f*(3.-2.*f);
  float n=i.x+i.y*57.+113.*i.z;
  return mix(
    mix(mix(hash(vec2(n+0.,n+1.)),hash(vec2(n+57.,n+58.)),f.x),
        mix(hash(vec2(n+113.,n+114.)),hash(vec2(n+170.,n+171.)),f.x),f.y),
    mix(mix(hash(vec2(n+226.,n+227.)),hash(vec2(n+283.,n+284.)),f.x),
        mix(hash(vec2(n+339.,n+340.)),hash(vec2(n+396.,n+397.)),f.x),f.y),
    f.z);
}

float fbm(vec3 p){
  float v=0., a=.5;
  for(int i=0;i<5;i++){
    v+=a*noise(p);
    p*=2.05;
    p.xy*=rot(.45+t*.015);
    a*=.52;
  }
  return v;
}

float stars(vec2 uv){
  vec2 gv=fract(uv)-.5;
  vec2 id=floor(uv);
  float n=hash(id);
  float s=smoothstep(.035,0.,length(gv));
  return s*step(.985,n)*mix(.3,1.,hash(id+4.));
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*r.xy)/r.y;
  vec2 mouse=(m-.5*r)/r.y;
  
  float time=t*.35;
  vec2 p=uv;
  
  float dMouse=length(p-mouse);
  p += normalize(p-mouse)*(.045/(dMouse+.12))*down;
  
  float radius=length(p);
  float angle=atan(p.y,p.x);
  
  float lens=.18/(radius+.08);
  angle += lens*.75 + time*.18;
  
  vec2 disk=vec2(cos(angle),sin(angle))*radius;
  disk.x*=1.65;
  disk*=rot(time*.18);
  
  float accretion=exp(-abs(radius-.34)*10.);
  accretion*=1.+.55*sin(angle*7.+time*5.);
  
  float bands=fbm(vec3(disk*4.5,time));
  float plasma=pow(max(0.,bands),2.2)*accretion;
  
  float core=smoothstep(.18,.02,radius);
  float eventHorizon=smoothstep(.23,.18,radius)*smoothstep(.055,.12,radius);
  
  float jet=exp(-abs(p.x)*22.)*smoothstep(.14,.03,abs(p.y));
  jet*=.22+.78*fbm(vec3(p*6.,time+2.));
  
  float field=0.;
  field+=stars(uv*90.+time*4.);
  field+=stars(uv*150.-time*3.)*.45;
  field+=stars(uv*260.+sin(time))*.25;
  
  float neb=fbm(vec3(uv*2.2,time*.35));
  neb*=smoothstep(1.4,.1,length(uv));
  
  vec3 deep=vec3(.01,.015,.04);
  vec3 blue=vec3(.03,.45,1.);
  vec3 cyan=vec3(.0,.95,1.);
  vec3 violet=vec3(.75,.18,1.);
  vec3 ember=vec3(1.,.38,.08);
  vec3 white=vec3(1.,.9,.72);
  
  vec3 col=deep;
  col+=field*vec3(.8,.92,1.4);
  col+=neb*vec3(.05,.12,.28);
  col+=plasma*mix(cyan,ember,smoothstep(.15,.8,sin(angle*3.+time)+.5))*2.2;
  col+=eventHorizon*white*1.8;
  col+=jet*mix(blue,violet,abs(p.y))*1.8;
  col*=1.-core*.95;
  
  float glow=exp(-radius*2.6);
  col+=glow*vec3(.02,.09,.22);
  
  col=1.-exp(-col*1.35);
  col=pow(col,vec3(.82));
  
  gl_FragColor=vec4(col,1.);
}
`;

function shader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
  return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,shader(gl.VERTEX_SHADER,vert));
gl.attachShader(prog,shader(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const U={
  r:gl.getUniformLocation(prog,"r"),
  m:gl.getUniformLocation(prog,"m"),
  t:gl.getUniformLocation(prog,"t"),
  down:gl.getUniformLocation(prog,"down")
};

let mx=innerWidth*.5,my=innerHeight*.5,down=0;
let dpr=Math.min(devicePixelRatio||1,1.6);

function resize(){
  canvas.width=innerWidth*dpr;
  canvas.height=innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
addEventListener("resize",resize);

function pointer(e){
  const touch=e.touches?e.touches[0]:e;
  mx=touch.clientX*dpr;
  my=(innerHeight-touch.clientY)*dpr;
}
addEventListener("pointermove",pointer);
addEventListener("pointerdown",e=>{down=1;pointer(e)});
addEventListener("pointerup",()=>down=0);
addEventListener("touchmove",e=>{pointer(e);e.preventDefault()},{passive:false});
addEventListener("touchstart",e=>{down=1;pointer(e)},{passive:false});
addEventListener("touchend",()=>down=0);

function draw(ms){
  gl.uniform2f(U.r,canvas.width,canvas.height);
  gl.uniform2f(U.m,mx,my);
  gl.uniform1f(U.t,ms*.001);
  gl.uniform1f(U.down,down);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
