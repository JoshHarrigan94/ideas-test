<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Runner POV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0e1014;
  font-family:system-ui,sans-serif;
}

.scene{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

svg{
  width:min(500px,90vw);
  height:min(700px,90vh);
}

.track{
  fill:#171a20;
}

.grain{
  opacity:.08;
}

.lane{
  stroke:#f5f1e8;
  stroke-width:4;
  stroke-linecap:round;
  opacity:.6;
  animation:trackScroll 1.4s linear infinite;
}

.delay1{
  animation-delay:-0.35s;
}

.delay2{
  animation-delay:-0.7s;
}

.delay3{
  animation-delay:-1.05s;
}

.shoe{
  transform-origin:center;
  filter:drop-shadow(0 14px 10px rgba(0,0,0,.35));
}

.left{
  animation:leftStride 1.15s ease-in-out infinite;
}

.right{
  animation:rightStride 1.15s ease-in-out infinite;
}

.sock{
  fill:#f0d4ba;
}

.upper{
  fill:#ff6d5e;
}

.sole{
  fill:#f7f4eb;
}

.detail{
  fill:#222630;
  opacity:.22;
}

.shadow{
  fill:black;
  opacity:.15;
}

@keyframes trackScroll{
  from{
    transform:translateY(-180px);
  }
  to{
    transform:translateY(180px);
  }
}

@keyframes leftStride{
  0%{
    transform:translate(112px,70px) rotate(-5deg) scale(1.02);
    opacity:1;
  }

  25%{
    transform:translate(105px,150px) rotate(-2deg);
    opacity:.95;
  }

  50%{
    transform:translate(98px,250px) rotate(3deg) scale(.94);
    opacity:.55;
  }

  75%{
    transform:translate(94px,340px) rotate(6deg) scale(.90);
    opacity:.18;
  }

  100%{
    transform:translate(112px,70px) rotate(-5deg) scale(1.02);
    opacity:1;
  }
}

@keyframes rightStride{
  0%{
    transform:translate(232px,340px) rotate(6deg) scale(.90);
    opacity:.18;
  }

  25%{
    transform:translate(226px,250px) rotate(3deg) scale(.94);
    opacity:.55;
  }

  50%{
    transform:translate(218px,150px) rotate(-2deg);
    opacity:.95;
  }

  75%{
    transform:translate(210px,70px) rotate(-5deg) scale(1.02);
    opacity:1;
  }

  100%{
    transform:translate(232px,340px) rotate(6deg) scale(.90);
    opacity:.18;
  }
}

.title{
  position:fixed;
  top:24px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  letter-spacing:.25em;
  text-transform:uppercase;
  font-size:12px;
  opacity:.5;
}
</style>
</head>

<body>

<div class="title">
Runner POV
</div>

<div class="scene">

<svg viewBox="0 0 420 520">

<rect
  class="track"
  width="420"
  height="520"
  rx="34"
/>

<g class="grain">
  <circle cx="70" cy="70" r="1.4" fill="white"/>
  <circle cx="210" cy="120" r="1" fill="white"/>
  <circle cx="335" cy="95" r="1.2" fill="white"/>
  <circle cx="130" cy="310" r="1" fill="white"/>
  <circle cx="305" cy="390" r="1.5" fill="white"/>
  <circle cx="80" cy="455" r="1.1" fill="white"/>
  <circle cx="180" cy="460" r="1.2" fill="white"/>
  <circle cx="330" cy="230" r="1.3" fill="white"/>
</g>

<!-- left lane -->

<line class="lane"
      x1="72"
      y1="-80"
      x2="42"
      y2="90"/>

<line class="lane delay1"
      x1="72"
      y1="110"
      x2="42"
      y2="280"/>

<line class="lane delay2"
      x1="72"
      y1="300"
      x2="42"
      y2="470"/>

<line class="lane delay3"
      x1="72"
      y1="490"
      x2="42"
      y2="660"/>

<!-- right lane -->

<line class="lane"
      x1="348"
      y1="-80"
      x2="378"
      y2="90"/>

<line class="lane delay1"
      x1="348"
      y1="110"
      x2="378"
      y2="280"/>

<line class="lane delay2"
      x1="348"
      y1="300"
      x2="378"
      y2="470"/>

<line class="lane delay3"
      x1="348"
      y1="490"
      x2="378"
      y2="660"/>

<!-- left foot -->

<g class="shoe left">

  <ellipse
    class="shadow"
    cx="36"
    cy="120"
    rx="24"
    ry="10"/>

  <ellipse
    class="upper"
    cx="36"
    cy="85"
    rx="29"
    ry="56"/>

  <ellipse
    class="sock"
    cx="36"
    cy="26"
    rx="20"
    ry="20"/>

  <path
    class="sole"
    d="M14 100
       Q36 124 58 100
       L56 122
       Q36 143 16 122 Z"/>

  <path
    class="detail"
    d="M20 65
       Q36 78 52 65
       L52 74
       Q36 88 20 74 Z"/>

</g>

<!-- right foot -->

<g class="shoe right">

  <ellipse
    class="shadow"
    cx="36"
    cy="120"
    rx="24"
    ry="10"/>

  <ellipse
    class="upper"
    cx="36"
    cy="85"
    rx="29"
    ry="56"/>

  <ellipse
    class="sock"
    cx="36"
    cy="26"
    rx="20"
    ry="20"/>

  <path
    class="sole"
    d="M14 100
       Q36 124 58 100
       L56 122
       Q36 143 16 122 Z"/>

  <path
    class="detail"
    d="M20 65
       Q36 78 52 65
       L52 74
       Q36 88 20 74 Z"/>

</g>

</svg>

</div>

</body>
</html>
