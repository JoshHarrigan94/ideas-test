<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ORBIT — Prototype</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #03040b;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: white;
  touch-action: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

.hud {
  position: fixed;
  top: 18px;
  left: 18px;
  right: 18px;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
}

.brand {
  letter-spacing: 0.28em;
  font-size: 12px;
  opacity: 0.62;
}

.score {
  font-size: 34px;
  font-weight: 800;
  line-height: 1;
  margin-top: 4px;
}

.meta {
  text-align: right;
  font-size: 13px;
  opacity: 0.76;
  line-height: 1.55;
}

.bottom-hint {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  opacity: 0.58;
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
}

.start-card,
.game-over-card {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: grid;
  place-items: center;
  padding: 24px;
  background: radial-gradient(circle at center, rgba(255, 190, 90, 0.08), rgba(0, 0, 0, 0.82));
}

.panel {
  max-width: 420px;
  width: 100%;
  padding: 28px;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 28px;
  background: rgba(5, 8, 18, 0.78);
  backdrop-filter: blur(18px);
  box-shadow: 0 30px 100px rgba(0,0,0,0.42);
}

.panel h1 {
  letter-spacing: 0.25em;
  font-size: 26px;
  margin-bottom: 12px;
}

.panel p {
  opacity: 0.76;
  line-height: 1.5;
  font-size: 15px;
  margin-bottom: 18px;
}

.panel button {
  width: 100%;
  border: 0;
  border-radius: 18px;
  padding: 16px 18px;
  background: linear-gradient(135deg, #ffd36c, #ff8f43);
  color: #160d04;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="hud">
  <div>
    <div class="brand">ORBIT</div>
    <div class="score" id="score">0</div>
  </div>

  <div class="meta">
    <div id="round">Round 1</div>
    <div id="energy">Energy 0</div>
    <div id="probes">Probes 8</div>
  </div>
</div>

<div class="bottom-hint" id="hint">Drag, aim, release</div>

<div class="start-card" id="startCard">
  <div class="panel">
    <h1>ORBIT</h1>
    <p>
      Aim a stream of probes through a dying star system.
      Gravity bends the path. Black holes consume. Wormholes distort.
    </p>
    <button id="startBtn">BEGIN RUN</button>
  </div>
</div>

<div class="game-over-card hidden" id="gameOverCard">
  <div class="panel">
    <h1>VOID</h1>
    <p id="finalStats">The system collapsed.</p>
    <button id="restartBtn">RESTART</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
/* =========================================================
   ORBIT — SINGLE FILE PROTOTYPE
   Prompt 2: gravity, specials, prediction, identity
   ========================================================= */

/* =========================================================
   TUNING
   ========================================================= */

const TUNING = {
  gravity: {
    asteroid: 0,
    crystal: 0,
    relic: 0.0008,
    planet: 0.0016,
    star: 0.0022,
    blackHole: 0.0068,
    wormhole: 0.0011,

    maxPull: 0.12,
    softening: 1800,
    predictionMaxPull: 0.09,
    velocityDamping: 0.9992
  },

  blackHole: {
    coreMultiplier: 0.48,
    probeDamage: 999
  },

  wormhole: {
    cooldownFrames: 42,
    exitBoost: 1.02
  },

  prediction: {
    steps: 155,
    stepSize: 1,
    dotEvery: 8
  },

  probes: {
    maxLife: 820,
    returnY: 90
  }
};

/* =========================================================
   CANVAS
   ========================================================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W = 0;
let H = 0;
let DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);

  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  game.launcher.x = W / 2;
  game.launcher.y = H - 105;
  game.dangerLine = H - 170;
}

window.addEventListener("resize", resize);

/* =========================================================
   DOM
   ========================================================= */

const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const energyEl = document.getElementById("energy");
const probesEl = document.getElementById("probes");
const hintEl = document.getElementById("hint");

const startCard = document.getElementById("startCard");
const gameOverCard = document.getElementById("gameOverCard");
const finalStats = document.getElementById("finalStats");

document.getElementById("startBtn").addEventListener("click", () => {
  startCard.classList.add("hidden");
  startGame();
});

document.getElementById("restartBtn").addEventListener("click", () => {
  gameOverCard.classList.add("hidden");
  startGame();
});

/* =========================================================
   GAME STATE
   ========================================================= */

const game = {
  running: false,
  gameOver: false,

  score: 0,
  energy: 0,
  round: 1,

  launcher: {
    x: 0,
    y: 0,
    radius: 13
  },

  dangerLine: 0,

  probeCount: 8,
  probeSpeed: 8.8,
  probeDamage: 1,

  aiming: false,
  canShoot: true,
  shotInProgress: false,

  pointer: {
    x: 0,
    y: 0
  },

  bodies: [],
  probes: [],
  particles: [],
  floaters: [],
  stars: [],
  wormholePairCounter: 0
};

/* =========================================================
   UTILITIES
   ========================================================= */

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function chance(v) {
  return Math.random() < v;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function dist(ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  return Math.sqrt(dx * dx + dy * dy);
}

function angleTo(ax, ay, bx, by) {
  return Math.atan2(by - ay, bx - ax);
}

function circleCollision(a, b) {
  return dist(a.x, a.y, b.x, b.y) < a.radius + b.radius;
}

function makeId() {
  return crypto.randomUUID ? crypto.randomUUID() : String(Math.random());
}

/* =========================================================
   BACKGROUND
   ========================================================= */

function seedStars() {
  game.stars = [];

  for (let i = 0; i < 140; i++) {
    game.stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: rand(0.4, 1.7),
      a: rand(0.15, 0.75),
      drift: rand(0.02, 0.12)
    });
  }
}

/* =========================================================
   CELESTIAL BODIES
   ========================================================= */

function getBodyStats(type) {
  const r = game.round;

  const stats = {
    asteroid: {
      radius: rand(22, 34),
      hp: Math.ceil(r * rand(1.2, 2.4)),
      scoreBonus: 1,
      energyBonus: 1
    },

    planet: {
      radius: rand(34, 46),
      hp: Math.ceil(r * rand(2.2, 3.6)),
      scoreBonus: 2,
      energyBonus: 2
    },

    star: {
      radius: rand(28, 38),
      hp: Math.ceil(r * rand(1.7, 2.9)),
      scoreBonus: 2,
      energyBonus: 2
    },

    blackHole: {
      radius: rand(30, 42),
      hp: Math.ceil(r * rand(3.5, 5.5)),
      scoreBonus: 4,
      energyBonus: 4
    },

    wormhole: {
      radius: rand(24, 30),
      hp: Math.ceil(r * rand(1.3, 2.2)),
      scoreBonus: 2,
      energyBonus: 2
    },

    crystal: {
      radius: rand(19, 26),
      hp: Math.max(1, Math.ceil(r * rand(0.45, 0.9))),
      scoreBonus: 3,
      energyBonus: 12
    },

    relic: {
      radius: rand(38, 52),
      hp: Math.ceil(r * rand(5.5, 8.5)),
      scoreBonus: 8,
      energyBonus: 20
    }
  };

  return stats[type] || stats.asteroid;
}

function createBody(x, y, type = "asteroid", extra = {}) {
  const stats = getBodyStats(type);

  return {
    id: makeId(),
    x,
    y,
    radius: stats.radius,
    hp: stats.hp,
    maxHp: stats.hp,
    type,
    scoreBonus: stats.scoreBonus,
    energyBonus: stats.energyBonus,
    pulse: rand(0, Math.PI * 2),
    spin: rand(0, Math.PI * 2),
    dead: false,
    pairId: extra.pairId || null,
    portalIndex: extra.portalIndex ?? null
  };
}

function chooseNormalType() {
  const roll = Math.random();

  if (roll < 0.58) return "asteroid";
  if (roll < 0.82) return "planet";
  return "star";
}

function allowedSpecialTypes() {
  const types = [];

  if (game.round >= 3 && game.round % 3 === 0) types.push("crystal");
  if (game.round >= 7 && game.round % 7 === 0) types.push("blackHole");
  if (game.round >= 10 && game.round % 10 === 0) types.push("relic");

  return types;
}

function spawnWormholePair(y) {
  const pairId = "wh-" + game.wormholePairCounter++;

  const x1 = rand(70, W * 0.42);
  const x2 = rand(W * 0.58, W - 70);

  game.bodies.push(createBody(x1, y + rand(-10, 10), "wormhole", {
    pairId,
    portalIndex: 0
  }));

  game.bodies.push(createBody(x2, y + rand(-10, 10), "wormhole", {
    pairId,
    portalIndex: 1
  }));
}

function spawnRow() {
  const columns = Math.max(4, Math.min(7, Math.floor(W / 72)));
  const cellW = (W - 36) / columns;
  const y = 105;

  if (game.round >= 5 && game.round % 5 === 0) {
    spawnWormholePair(y);
  }

  const specials = allowedSpecialTypes();

  for (let i = 0; i < columns; i++) {
    if (Math.random() > 0.64) continue;

    const x = 18 + cellW * i + cellW / 2;

    let type = chooseNormalType();

    if (specials.length && chance(0.18)) {
      type = specials[Math.floor(Math.random() * specials.length)];
    }

    game.bodies.push(createBody(x + rand(-8, 8), y + rand(-4, 4), type));
  }

  if (game.bodies.length < 3) {
    game.bodies.push(createBody(W / 2, y, "planet"));
  }
}

function advanceBodies() {
  const drop = 48;

  for (const body of game.bodies) {
    body.y += drop;
  }
}

/* =========================================================
   GRAVITY
   ========================================================= */

function gravityStrengthFor(type) {
  return TUNING.gravity[type] || 0;
}

function applyGravityToObject(obj, prediction = false) {
  for (const body of game.bodies) {
    if (body.dead) continue;

    const strength = gravityStrengthFor(body.type);
    if (!strength) continue;

    const dx = body.x - obj.x;
    const dy = body.y - obj.y;
    const d2 = dx * dx + dy * dy + TUNING.gravity.softening;
    const d = Math.sqrt(d2);

    const pull = Math.min(
      prediction ? TUNING.gravity.predictionMaxPull : TUNING.gravity.maxPull,
      (strength * body.radius * body.radius * 1200) / d2
    );

    obj.vx += (dx / d) * pull;
    obj.vy += (dy / d) * pull;
  }
}

/* =========================================================
   WORMHOLES
   ========================================================= */

function findWormholePartner(body) {
  if (body.type !== "wormhole" || !body.pairId) return null;

  return game.bodies.find(other =>
    other.type === "wormhole" &&
    other.pairId === body.pairId &&
    other.id !== body.id &&
    !other.dead
  );
}

function teleportProbe(probe, entry) {
  if (probe.wormholeCooldown > 0) return;

  const exit = findWormholePartner(entry);
  if (!exit) return;

  const speed = Math.sqrt(probe.vx * probe.vx + probe.vy * probe.vy);
  const a = Math.atan2(probe.vy, probe.vx);

  probe.x = exit.x + Math.cos(a) * (exit.radius + probe.radius + 8);
  probe.y = exit.y + Math.sin(a) * (exit.radius + probe.radius + 8);

  probe.vx *= TUNING.wormhole.exitBoost;
  probe.vy *= TUNING.wormhole.exitBoost;
  probe.wormholeCooldown = TUNING.wormhole.cooldownFrames;

  burst(entry.x, entry.y, 10, 2.4, "wormhole");
  burst(exit.x, exit.y, 14, 3.2, "wormhole");
  addFloater("PHASE", exit.x, exit.y);
}

/* =========================================================
   PROBES
   ========================================================= */

function createProbe(angle, delay) {
  return {
    x: game.launcher.x,
    y: game.launcher.y,
    vx: Math.cos(angle) * game.probeSpeed,
    vy: Math.sin(angle) * game.probeSpeed,
    radius: 4,
    delay,
    active: false,
    life: TUNING.probes.maxLife,
    hitCooldown: new Map(),
    wormholeCooldown: 0,
    trail: []
  };
}

function fireShot(targetX, targetY) {
  if (!game.canShoot || game.shotInProgress) return;

  let a = angleTo(game.launcher.x, game.launcher.y, targetX, targetY);

  if (Math.sin(a) > -0.12) {
    a = -Math.PI / 2;
  }

  game.canShoot = false;
  game.shotInProgress = true;
  hintEl.textContent = "Harvesting trajectory";

  for (let i = 0; i < game.probeCount; i++) {
    game.probes.push(createProbe(a, i * 5));
  }
}

/* =========================================================
   PARTICLES
   ========================================================= */

function particleColor(kind) {
  if (kind === "blackHole") return ["180", "120", "255"];
  if (kind === "wormhole") return ["110", "220", "255"];
  if (kind === "crystal") return ["130", "255", "230"];
  if (kind === "relic") return ["255", "205", "110"];
  return ["255", "205", "125"];
}

function burst(x, y, amount = 16, power = 3, kind = "default") {
  const c = particleColor(kind);

  for (let i = 0; i < amount; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.5, power);

    game.particles.push({
      x,
      y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      radius: rand(1, 3.5),
      life: rand(24, 56),
      maxLife: 56,
      c
    });
  }
}

function addFloater(text, x, y) {
  game.floaters.push({
    text,
    x,
    y,
    vy: -0.45,
    life: 60
  });
}

/* =========================================================
   INPUT
   ========================================================= */

function setPointer(e) {
  const p = e.touches ? e.touches[0] : e;
  game.pointer.x = p.clientX;
  game.pointer.y = p.clientY;
}

function pointerDown(e) {
  if (!game.running || game.gameOver || !game.canShoot) return;

  e.preventDefault?.();
  setPointer(e);
  game.aiming = true;
}

function pointerMove(e) {
  e.preventDefault?.();
  setPointer(e);
}

function pointerUp(e) {
  e?.preventDefault?.();

  if (!game.aiming) return;

  game.aiming = false;
  fireShot(game.pointer.x, game.pointer.y);
}

window.addEventListener("mousedown", pointerDown);
window.addEventListener("mousemove", pointerMove);
window.addEventListener("mouseup", pointerUp);

window.addEventListener("touchstart", pointerDown, { passive: false });
window.addEventListener("touchmove", pointerMove, { passive: false });
window.addEventListener("touchend", pointerUp, { passive: false });

/* =========================================================
   UPDATE
   ========================================================= */

function damageBody(body, probe) {
  body.hp -= game.probeDamage;

  let reward = 1;
  let energyReward = 1;

  if (body.type === "crystal") {
    reward = 3;
    energyReward = 3;
  }

  if (body.type === "relic") {
    reward = 4;
    energyReward = 2;
  }

  game.score += reward;
  game.energy += energyReward;

  burst(probe.x, probe.y, 8, 2.5, body.type);
  addFloater("+" + reward, probe.x, probe.y);

  if (body.hp <= 0) {
    body.dead = true;

    const scoreReward = body.maxHp * body.scoreBonus;
    const energyRewardFinal = body.energyBonus;

    game.score += scoreReward;
    game.energy += energyRewardFinal;

    burst(body.x, body.y, 30, 4.8, body.type);
    addFloater(
      body.type === "crystal" ? "CRYSTAL +" + energyRewardFinal :
      body.type === "relic" ? "RELIC +" + scoreReward :
      body.type === "blackHole" ? "SINGULARITY" :
      "HARVEST",
      body.x,
      body.y
    );
  }
}

function reflectProbeFromBody(probe, body) {
  const dx = probe.x - body.x;
  const dy = probe.y - body.y;
  const d = Math.sqrt(dx * dx + dy * dy) || 1;

  const nx = dx / d;
  const ny = dy / d;

  const dot = probe.vx * nx + probe.vy * ny;

  probe.vx -= 2 * dot * nx;
  probe.vy -= 2 * dot * ny;

  probe.x = body.x + nx * (body.radius + probe.radius + 1);
  probe.y = body.y + ny * (body.radius + probe.radius + 1);
}

function updateProbes() {
  for (let i = game.probes.length - 1; i >= 0; i--) {
    const probe = game.probes[i];

    if (probe.delay > 0) {
      probe.delay--;
      continue;
    }

    probe.active = true;
    probe.life--;

    if (probe.wormholeCooldown > 0) {
      probe.wormholeCooldown--;
    }

    applyGravityToObject(probe, false);

    probe.vx *= TUNING.gravity.velocityDamping;
    probe.vy *= TUNING.gravity.velocityDamping;

    probe.x += probe.vx;
    probe.y += probe.vy;

    probe.trail.push({ x: probe.x, y: probe.y });
    if (probe.trail.length > 18) probe.trail.shift();

    if (probe.x < probe.radius) {
      probe.x = probe.radius;
      probe.vx *= -1;
      burst(probe.x, probe.y, 3, 1.5);
    }

    if (probe.x > W - probe.radius) {
      probe.x = W - probe.radius;
      probe.vx *= -1;
      burst(probe.x, probe.y, 3, 1.5);
    }

    if (probe.y < probe.radius + 60) {
      probe.y = probe.radius + 60;
      probe.vy *= -1;
      burst(probe.x, probe.y, 3, 1.5);
    }

    for (const body of game.bodies) {
      if (body.dead) continue;

      if (body.type === "blackHole") {
        const core = body.radius * TUNING.blackHole.coreMultiplier;
        if (dist(probe.x, probe.y, body.x, body.y) < core) {
          burst(probe.x, probe.y, 20, 3.2, "blackHole");
          addFloater("VOID", probe.x, probe.y);
          game.probes.splice(i, 1);
          continue;
        }
      }

      if (body.type === "wormhole" && circleCollision(probe, body)) {
        teleportProbe(probe, body);
        damageBody(body, probe);
        continue;
      }

      const key = body.id;
      const cooldown = probe.hitCooldown.get(key) || 0;

      if (cooldown > 0) {
        probe.hitCooldown.set(key, cooldown - 1);
        continue;
      }

      if (circleCollision(probe, body)) {
        reflectProbeFromBody(probe, body);
        damageBody(body, probe);
        probe.hitCooldown.set(key, 10);
      }
    }

    if (
      probe.life <= 0 ||
      probe.y > H + TUNING.probes.returnY ||
      probe.x < -140 ||
      probe.x > W + 140
    ) {
      game.probes.splice(i, 1);
    }
  }
}

function updateParticles() {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];

    p.life--;
    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.985;
    p.vy *= 0.985;

    if (p.life <= 0) {
      game.particles.splice(i, 1);
    }
  }
}

function updateFloaters() {
  for (let i = game.floaters.length - 1; i >= 0; i--) {
    const f = game.floaters[i];

    f.life--;
    f.y += f.vy;

    if (f.life <= 0) {
      game.floaters.splice(i, 1);
    }
  }
}

function cleanupBodies() {
  game.bodies = game.bodies.filter(b => !b.dead);
}

function checkTurnEnd() {
  if (!game.shotInProgress) return;

  const activeProbes = game.probes.some(p => p.active || p.delay > 0);

  if (!activeProbes) {
    game.shotInProgress = false;
    game.canShoot = true;

    game.round++;
    advanceBodies();
    spawnRow();

    hintEl.textContent = "Drag, aim, release";

    for (const body of game.bodies) {
      if (body.type === "wormhole") continue;

      if (body.y + body.radius >= game.dangerLine) {
        endGame();
        return;
      }
    }
  }
}

function update() {
  if (!game.running || game.gameOver) return;

  for (const s of game.stars) {
    s.y += s.drift;
    if (s.y > H) {
      s.y = 0;
      s.x = Math.random() * W;
    }
  }

  for (const body of game.bodies) {
    body.pulse += 0.03;
    body.spin += 0.018;
  }

  updateProbes();
  updateParticles();
  updateFloaters();
  cleanupBodies();
  checkTurnEnd();

  scoreEl.textContent = game.score;
  roundEl.textContent = "Round " + game.round;
  energyEl.textContent = "Energy " + game.energy;
  probesEl.textContent = "Probes " + game.probeCount;
}

/* =========================================================
   AIM PREDICTION
   ========================================================= */

function simulatePrediction(angle) {
  const ghost = {
    x: game.launcher.x,
    y: game.launcher.y,
    vx: Math.cos(angle) * game.probeSpeed,
    vy: Math.sin(angle) * game.probeSpeed,
    radius: 4
  };

  const points = [];

  for (let i = 0; i < TUNING.prediction.steps; i++) {
    applyGravityToObject(ghost, true);

    ghost.vx *= TUNING.gravity.velocityDamping;
    ghost.vy *= TUNING.gravity.velocityDamping;

    ghost.x += ghost.vx * TUNING.prediction.stepSize;
    ghost.y += ghost.vy * TUNING.prediction.stepSize;

    if (ghost.x < ghost.radius) {
      ghost.x = ghost.radius;
      ghost.vx *= -1;
    }

    if (ghost.x > W - ghost.radius) {
      ghost.x = W - ghost.radius;
      ghost.vx *= -1;
    }

    if (ghost.y < ghost.radius + 60) {
      ghost.y = ghost.radius + 60;
      ghost.vy *= -1;
    }

    for (const body of game.bodies) {
      if (body.dead) continue;

      if (body.type === "blackHole") {
        const core = body.radius * TUNING.blackHole.coreMultiplier;
        if (dist(ghost.x, ghost.y, body.x, body.y) < core) {
          points.push({ x: ghost.x, y: ghost.y, danger: true });
          return points;
        }
      }

      if (circleCollision(ghost, body)) {
        const dx = ghost.x - body.x;
        const dy = ghost.y - body.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;

        const nx = dx / d;
        const ny = dy / d;
        const dot = ghost.vx * nx + ghost.vy * ny;

        ghost.vx -= 2 * dot * nx;
        ghost.vy -= 2 * dot * ny;

        ghost.x = body.x + nx * (body.radius + ghost.radius + 1);
        ghost.y = body.y + ny * (body.radius + ghost.radius + 1);
      }
    }

    if (i % TUNING.prediction.dotEvery === 0) {
      points.push({ x: ghost.x, y: ghost.y, danger: false });
    }

    if (ghost.y > H + 80 || ghost.x < -80 || ghost.x > W + 80) {
      break;
    }
  }

  return points;
}

/* =========================================================
   DRAWING
   ========================================================= */

function drawBackground() {
  const g = ctx.createRadialGradient(W * 0.5, H * 0.35, 0, W * 0.5, H * 0.35, Math.max(W, H));
  g.addColorStop(0, "#101735");
  g.addColorStop(0.45, "#050714");
  g.addColorStop(1, "#02030a");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (const s of game.stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

function drawDangerLine() {
  ctx.save();
  ctx.strokeStyle = "rgba(255, 90, 90, 0.38)";
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 10]);
  ctx.beginPath();
  ctx.moveTo(18, game.dangerLine);
  ctx.lineTo(W - 18, game.dangerLine);
  ctx.stroke();
  ctx.restore();
}

function bodyColors(type) {
  const colors = {
    asteroid: ["rgba(185, 145, 255, 0.18)", "#b998ff", "#f2eaff"],
    planet: ["rgba(88, 190, 255, 0.22)", "#66d5ff", "#d9f7ff"],
    star: ["rgba(255, 180, 70, 0.28)", "#ffbc55", "#fff1ba"],
    blackHole: ["rgba(155, 80, 255, 0.24)", "#2b123e", "#c793ff"],
    wormhole: ["rgba(80, 220, 255, 0.22)", "#42d7ff", "#d9fbff"],
    crystal: ["rgba(90, 255, 220, 0.22)", "#68ffde", "#eafffb"],
    relic: ["rgba(255, 215, 120, 0.26)", "#d19a3f", "#fff0bd"]
  };

  return colors[type] || colors.asteroid;
}

function drawGravityField(body) {
  const strength = gravityStrengthFor(body.type);
  if (!strength) return;

  ctx.save();

  const alpha =
    body.type === "blackHole" ? 0.22 :
    body.type === "star" ? 0.14 :
    0.09;

  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth = 1;

  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(
      body.x,
      body.y,
      body.radius * (1.7 + i * 0.72) + Math.sin(body.pulse + i) * 2,
      0,
      Math.PI * 2
    );
    ctx.stroke();
  }

  ctx.restore();
}

function drawWormholeLinks() {
  const drawn = new Set();

  ctx.save();

  for (const body of game.bodies) {
    if (body.type !== "wormhole" || !body.pairId || drawn.has(body.pairId)) continue;

    const partner = findWormholePartner(body);
    if (!partner) continue;

    drawn.add(body.pairId);

    ctx.strokeStyle = "rgba(80, 220, 255, 0.18)";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 12]);

    ctx.beginPath();
    ctx.moveTo(body.x, body.y);
    ctx.lineTo(partner.x, partner.y);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBlackHole(body) {
  ctx.save();
  ctx.translate(body.x, body.y);
  ctx.rotate(body.spin);

  const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, body.radius * 3.2);
  rg.addColorStop(0, "rgba(0,0,0,1)");
  rg.addColorStop(0.28, "rgba(24,5,42,1)");
  rg.addColorStop(0.55, "rgba(148,82,255,0.32)");
  rg.addColorStop(1, "rgba(148,82,255,0)");

  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.arc(0, 0, body.radius * 3.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(210,160,255,0.76)";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.ellipse(0, 0, body.radius * 1.55, body.radius * 0.48, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = "#020006";
  ctx.beginPath();
  ctx.arc(0, 0, body.radius * 0.62, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "800 13px system-ui";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(body.hp, body.x, body.y);
}

function drawBodyCore(body) {
  if (body.type === "blackHole") {
    drawBlackHole(body);
    return;
  }

  const [glow, mid, core] = bodyColors(body.type);
  const pulse = Math.sin(body.pulse) * 2;

  const glowRadius =
    body.type === "wormhole" ? body.radius * 3.1 :
    body.type === "relic" ? body.radius * 3 :
    body.radius * 2.8;

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(body.x, body.y, glowRadius + pulse, 0, Math.PI * 2);
  ctx.fill();

  if (body.type === "wormhole") {
    ctx.save();
    ctx.translate(body.x, body.y);
    ctx.rotate(body.spin * 1.8);

    ctx.strokeStyle = "rgba(210,250,255,0.85)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, body.radius * 1.1, body.radius * 0.55, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.rotate(Math.PI / 2.7);
    ctx.strokeStyle = "rgba(80,220,255,0.62)";
    ctx.beginPath();
    ctx.ellipse(0, 0, body.radius * 1.05, body.radius * 0.48, 0, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();
  }

  ctx.fillStyle = mid;
  ctx.beginPath();
  ctx.arc(body.x, body.y, body.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(255,255,255,0.16)";
  ctx.beginPath();
  ctx.arc(body.x - body.radius * 0.28, body.y - body.radius * 0.32, body.radius * 0.38, 0, Math.PI * 2);
  ctx.fill();

  if (body.type === "crystal") {
    ctx.save();
    ctx.translate(body.x, body.y);
    ctx.rotate(body.spin);

    ctx.strokeStyle = "rgba(255,255,255,0.65)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -body.radius);
    ctx.lineTo(body.radius * 0.75, 0);
    ctx.lineTo(0, body.radius);
    ctx.lineTo(-body.radius * 0.75, 0);
    ctx.closePath();
    ctx.stroke();

    ctx.restore();
  }

  if (body.type === "relic") {
    ctx.save();
    ctx.translate(body.x, body.y);
    ctx.rotate(body.spin);

    ctx.strokeStyle = "rgba(255,232,170,0.85)";
    ctx.lineWidth = 2;
    ctx.strokeRect(-body.radius * 0.52, -body.radius * 0.52, body.radius * 1.04, body.radius * 1.04);

    ctx.restore();
  }

  ctx.fillStyle = body.type === "wormhole" ? "#06121c" : "#08101b";
  ctx.font = "800 14px system-ui";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(body.hp, body.x, body.y);
}

function drawBodies() {
  drawWormholeLinks();

  for (const body of game.bodies) {
    drawGravityField(body);
  }

  for (const body of game.bodies) {
    drawBodyCore(body);
  }
}

function drawLauncher() {
  ctx.save();

  const x = game.launcher.x;
  const y = game.launcher.y;

  const glow = ctx.createRadialGradient(x, y, 0, x, y, 60);
  glow.addColorStop(0, "rgba(255, 210, 120, 0.5)");
  glow.addColorStop(1, "rgba(255, 210, 120, 0)");

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 60, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ffd36c";
  ctx.beginPath();
  ctx.arc(x, y, game.launcher.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.72)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, game.launcher.radius + 7, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function getAimAngle() {
  let a = angleTo(game.launcher.x, game.launcher.y, game.pointer.x, game.pointer.y);

  if (Math.sin(a) > -0.12) {
    a = -Math.PI / 2;
  }

  return a;
}

function drawAimLine() {
  if (!game.aiming || !game.canShoot) return;

  const x = game.launcher.x;
  const y = game.launcher.y;
  const a = getAimAngle();

  const prediction = simulatePrediction(a);

  ctx.save();

  for (let i = 0; i < prediction.length; i++) {
    const p = prediction[i];
    const alpha = 1 - i / prediction.length;

    ctx.fillStyle = p.danger
      ? `rgba(255, 80, 110, ${alpha})`
      : `rgba(255, 211, 108, ${alpha * 0.8})`;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.danger ? 6 : 3.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 9]);

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + Math.cos(a) * 130, y + Math.sin(a) * 130);
  ctx.stroke();

  ctx.restore();
}

function drawProbes() {
  for (const p of game.probes) {
    if (!p.active) continue;

    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      const alpha = i / p.trail.length;

      ctx.fillStyle = `rgba(127, 255, 212, ${alpha * 0.32})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.radius * alpha, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "#7fffd4";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.beginPath();
    ctx.arc(p.x - 1.2, p.y - 1.2, 1.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of game.particles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    const [r, g, b] = p.c || ["255", "205", "125"];

    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFloaters() {
  ctx.save();
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "800 13px system-ui";

  for (const f of game.floaters) {
    ctx.globalAlpha = clamp(f.life / 60, 0, 1);
    ctx.fillStyle = "#ffe49a";
    ctx.fillText(f.text, f.x, f.y);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function draw() {
  drawBackground();
  drawDangerLine();
  drawBodies();
  drawParticles();
  drawProbes();
  drawFloaters();
  drawAimLine();
  drawLauncher();
}

/* =========================================================
   GAME FLOW
   ========================================================= */

function startGame() {
  game.running = true;
  game.gameOver = false;

  game.score = 0;
  game.energy = 0;
  game.round = 1;

  game.probeCount = 8;
  game.probeSpeed = 8.8;
  game.probeDamage = 1;

  game.aiming = false;
  game.canShoot = true;
  game.shotInProgress = false;

  game.bodies = [];
  game.probes = [];
  game.particles = [];
  game.floaters = [];
  game.wormholePairCounter = 0;

  resize();
  seedStars();

  spawnRow();
  spawnRow();

  hintEl.textContent = "Drag, aim, release";
}

function endGame() {
  game.gameOver = true;
  game.running = false;

  finalStats.textContent =
    "Final score " +
    game.score +
    " · Energy " +
    game.energy +
    " · Round " +
    game.round;

  gameOverCard.classList.remove("hidden");
}

/* =========================================================
   LOOP
   ========================================================= */

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resize();
seedStars();
loop();
</script>
