<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tennis Court Motion Poster — Prompt 1</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: #061728;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
}

svg {
  width: 100vw;
  height: 100vh;
  display: block;
  background: #061728;
}

.blue-court {
  fill: #078bd4;
}

.orange-court {
  fill: #ff8a00;
}

.dark-world {
  fill: #061728;
}

.court-line {
  stroke: #fff7df;
  stroke-width: 6;
  stroke-linecap: square;
  fill: none;
}

.net-post {
  fill: #fff7df;
}

.net-post-side {
  fill: #d8c7a9;
}

.net-line {
  stroke: #071625;
  stroke-width: 2;
  opacity: 0.9;
}

.shadow {
  fill: #051320;
  opacity: 0.66;
}

.shadow-light {
  fill: #051320;
  opacity: 0.36;
}

.ball {
  fill: #f5e800;
}

.ball-side {
  fill: #071625;
  opacity: 0.82;
}

.machine-red {
  fill: #9b140f;
}

.machine-dark {
  fill: #4d0908;
}

.machine-yellow {
  fill: #f5e800;
}

.machine-wheel {
  fill: #4c3028;
}

.texture {
  opacity: 0.15;
  mix-blend-mode: multiply;
}

.speck-blue {
  fill: #003e68;
}

.speck-orange {
  fill: #814300;
}

.ladder-line {
  stroke: #fff7df;
  stroke-width: 3;
  fill: none;
  opacity: 0.75;
}
</style>
</head>

<body>

<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">

  <!-- background -->
  <rect class="dark-world" width="1200" height="900" />

  <!-- orange court area -->
  <path class="orange-court" d="M0 0 H560 L420 275 L0 405 Z" />

  <!-- blue main court -->
  <path class="blue-court" d="M560 0 H1200 V900 H0 V405 L420 275 Z" />

  <!-- far dark upper strip -->
  <path class="dark-world" d="M560 0 H1200 L1060 75 H515 Z" opacity="0.9" />

  <!-- court white lines -->
  <g>
    <path class="court-line" d="M0 565 L705 0" />
    <path class="court-line" d="M0 725 L885 0" />
    <path class="court-line" d="M0 890 L1070 0" />

    <path class="court-line" d="M0 565 L1200 320" />
    <path class="court-line" d="M0 725 L1200 475" />
    <path class="court-line" d="M0 890 L1200 630" />

    <path class="court-line" d="M530 0 L1200 365" />
    <path class="court-line" d="M330 900 L1200 715" />
  </g>

  <!-- umpire chair on orange court -->
  <g transform="translate(180 10)">
    <path class="shadow-light" d="M-55 190 L110 245 L220 205 L48 150 Z" />

    <path class="ladder-line" d="M0 0 L0 160 L-50 220" />
    <path class="ladder-line" d="M65 0 L65 165 L120 230" />
    <path class="ladder-line" d="M0 0 H65" />
    <path class="ladder-line" d="M0 45 H65" />
    <path class="ladder-line" d="M0 90 H65" />

    <path class="ladder-line" d="M65 55 L120 35" />
    <path class="ladder-line" d="M65 95 L125 75" />
    <path class="ladder-line" d="M65 135 L130 112" />
  </g>

  <!-- net shadow -->
  <path
    class="shadow"
    d="M300 290
       L1135 765
       L1100 815
       L265 340 Z"
  />

  <!-- net posts -->
  <g>
    <path class="shadow" d="M330 210 L385 250 L365 290 L310 250 Z" />

    <path class="net-post-side" d="M326 158 L350 174 L350 287 L326 270 Z" />
    <path class="net-post" d="M350 174 L370 163 L370 276 L350 287 Z" />
    <path class="net-post" d="M326 158 L346 147 L370 163 L350 174 Z" />

    <path class="net-post-side" d="M1122 620 L1148 636 L1148 735 L1122 720 Z" />
    <path class="net-post" d="M1148 636 L1168 625 L1168 724 L1148 735 Z" />
    <path class="net-post" d="M1122 620 L1142 608 L1168 625 L1148 636 Z" />
  </g>

  <!-- net mesh -->
  <g>
    <path d="M358 183 L1155 642 L1155 710 L358 252 Z" fill="rgba(255,247,223,0.13)" />

    <!-- top and bottom cords -->
    <path class="net-line" d="M358 183 L1155 642" stroke-width="5" />
    <path class="net-line" d="M358 252 L1155 710" stroke-width="4" />

    <!-- vertical mesh -->
    <g>
      <line class="net-line" x1="380" y1="196" x2="380" y2="265" />
      <line class="net-line" x1="420" y1="219" x2="420" y2="288" />
      <line class="net-line" x1="460" y1="242" x2="460" y2="311" />
      <line class="net-line" x1="500" y1="265" x2="500" y2="334" />
      <line class="net-line" x1="540" y1="288" x2="540" y2="357" />
      <line class="net-line" x1="580" y1="311" x2="580" y2="380" />
      <line class="net-line" x1="620" y1="334" x2="620" y2="403" />
      <line class="net-line" x1="660" y1="357" x2="660" y2="426" />
      <line class="net-line" x1="700" y1="380" x2="700" y2="449" />
      <line class="net-line" x1="740" y1="403" x2="740" y2="472" />
      <line class="net-line" x1="780" y1="426" x2="780" y2="495" />
      <line class="net-line" x1="820" y1="449" x2="820" y2="518" />
      <line class="net-line" x1="860" y1="472" x2="860" y2="541" />
      <line class="net-line" x1="900" y1="495" x2="900" y2="564" />
      <line class="net-line" x1="940" y1="518" x2="940" y2="587" />
      <line class="net-line" x1="980" y1="541" x2="980" y2="610" />
      <line class="net-line" x1="1020" y1="564" x2="1020" y2="633" />
      <line class="net-line" x1="1060" y1="587" x2="1060" y2="656" />
      <line class="net-line" x1="1100" y1="610" x2="1100" y2="679" />
    </g>

    <!-- horizontal mesh -->
    <g>
      <path class="net-line" d="M358 197 L1155 656" />
      <path class="net-line" d="M358 211 L1155 670" />
      <path class="net-line" d="M358 225 L1155 684" />
      <path class="net-line" d="M358 239 L1155 698" />
    </g>
  </g>

  <!-- ball machine shadow -->
  <path class="shadow" d="M930 135 L1040 190 L990 230 L885 172 Z" />

  <!-- ball machine -->
  <g transform="translate(920 85)">
    <ellipse class="machine-dark" cx="45" cy="38" rx="34" ry="22" />
    <ellipse class="machine-red" cx="45" cy="30" rx="38" ry="24" />
    <ellipse class="machine-yellow" cx="32" cy="24" rx="7" ry="6" />
    <ellipse class="machine-yellow" cx="47" cy="22" rx="8" ry="6" />
    <ellipse class="machine-yellow" cx="60" cy="27" rx="7" ry="6" />

    <rect class="machine-red" x="28" y="52" width="36" height="58" rx="12" />
    <rect class="machine-dark" x="20" y="102" width="54" height="18" rx="8" />

    <ellipse class="machine-wheel" cx="12" cy="120" rx="14" ry="10" />
    <ellipse class="machine-wheel" cx="80" cy="120" rx="14" ry="10" />
  </g>

  <!-- tennis balls -->
  <g>
    <path class="shadow" d="M225 287 C245 292 255 304 246 314 C224 310 211 301 214 292 Z" />
    <circle class="ball" cx="225" cy="280" r="10" />
    <path class="ball-side" d="M217 273 C226 276 232 283 235 291 C226 290 218 284 217 273 Z" />

    <path class="shadow" d="M535 435 C555 441 565 452 556 462 C534 458 521 449 524 440 Z" />
    <circle class="ball" cx="535" cy="428" r="10" />
    <path class="ball-side" d="M527 421 C536 424 542 431 545 439 C536 438 528 432 527 421 Z" />

    <path class="shadow" d="M590 463 C610 469 620 480 611 490 C589 486 576 477 579 468 Z" />
    <circle class="ball" cx="590" cy="456" r="10" />
    <path class="ball-side" d="M582 449 C591 452 597 459 600 467 C591 466 583 460 582 449 Z" />

    <path class="shadow" d="M900 707 C920 713 930 724 921 734 C899 730 886 721 889 712 Z" />
    <circle class="ball" cx="900" cy="700" r="10" />
    <path class="ball-side" d="M892 693 C901 696 907 703 910 711 C901 710 893 704 892 693 Z" />

    <path class="shadow" d="M1110 492 C1130 498 1140 509 1131 519 C1109 515 1096 506 1099 497 Z" />
    <circle class="ball" cx="1110" cy="485" r="10" />
    <path class="ball-side" d="M1102 478 C1111 481 1117 488 1120 496 C1111 495 1103 489 1102 478 Z" />
  </g>

  <!-- texture -->
  <g class="texture">
    <circle class="speck-blue" cx="120" cy="480" r="1.4" />
    <circle class="speck-blue" cx="240" cy="530" r="1.1" />
    <circle class="speck-blue" cx="410" cy="620" r="1.5" />
    <circle class="speck-blue" cx="660" cy="430" r="1.2" />
    <circle class="speck-blue" cx="790" cy="760" r="1.3" />
    <circle class="speck-blue" cx="980" cy="390" r="1.1" />
    <circle class="speck-blue" cx="1100" cy="820" r="1.5" />

    <circle class="speck-orange" cx="95" cy="155" r="1.3" />
    <circle class="speck-orange" cx="185" cy="255" r="1.1" />
    <circle class="speck-orange" cx="335" cy="90" r="1.4" />
    <circle class="speck-orange" cx="410" cy="225" r="1.2" />
  </g>

</svg>

</body>
</html>
