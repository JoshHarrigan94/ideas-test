<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Loop — Pass 1</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: #071625;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
}

svg {
  width: 100vw;
  height: 100vh;
  display: block;
  background: #071625;
  transform: scale(1.45) translateY(-40px);
  transform-origin: center;
}

.track-red {
  fill: #e94319;
}

.track-red-dark {
  fill: #c93416;
  opacity: 0.45;
}

.infield {
  fill: #0077b8;
}

.outer-blue {
  fill: #062033;
}

.line {
  fill: none;
  stroke: #ffe7bf;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.thin-line {
  fill: none;
  stroke: #ffe7bf;
  stroke-width: 3;
  stroke-linecap: round;
  opacity: 0.92;
}

.mark {
  stroke: #ffe7bf;
  stroke-width: 4;
  stroke-linecap: round;
  opacity: 0.9;
}

.number {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 42px;
  font-weight: 800;
  fill: #ffd9aa;
  opacity: 0.72;
}

.shadow {
  fill: #06121f;
  opacity: 0.72;
}

.hurdle-white {
  fill: #ffe7bf;
}

.hurdle-dark {
  fill: #06121f;
}

.texture {
  opacity: 0.13;
  mix-blend-mode: multiply;
}

.speck {
  fill: #581d12;
  opacity: 0.32;
}

.blue-speck {
  fill: #00101c;
  opacity: 0.25;
}

.runner-on-path {
  transform-origin: center;
}

.runner-shadow {
  fill: #06121f;
  opacity: 0.7;
  filter: blur(1px);
  animation: shadowPulse 0.42s ease-in-out infinite;
}

.runner-body {
  transform-origin: center;
  animation: bodyPulse 0.42s ease-in-out infinite;
}

.limb {
  transform-box: fill-box;
  transform-origin: center;
  animation-duration: 0.42s;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}

.front-leg,
.rear-arm,
.front-shoe {
  animation-name: strideA;
}

.rear-leg,
.front-arm,
.rear-shoe {
  animation-name: strideB;
}

.torso,
.head {
  transform-box: fill-box;
  transform-origin: center;
  animation: torsoRhythm 0.42s ease-in-out infinite;
}

.shoe {
  transform-box: fill-box;
  transform-origin: center;
  animation-duration: 0.42s;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}

@keyframes strideA {
  0%, 100% {
    transform: rotate(-18deg) translateY(0);
  }

  50% {
    transform: rotate(18deg) translateY(-3px);
  }
}

@keyframes strideB {
  0%, 100% {
    transform: rotate(18deg) translateY(-3px);
  }

  50% {
    transform: rotate(-18deg) translateY(0);
  }
}

@keyframes bodyPulse {
  0%, 100% {
    transform: rotate(90deg) scale(0.9) translateY(0);
  }

  50% {
    transform: rotate(90deg) scale(0.92) translateY(-2px);
  }
}

@keyframes torsoRhythm {
  0%, 100% {
    transform: rotate(-4deg);
  }

  50% {
    transform: rotate(4deg);
  }
}

@keyframes shadowPulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.72;
  }

  50% {
    transform: scale(0.82);
    opacity: 0.46;
  }
}

.runner-on-path {
  animation: runnerDepth 9s linear infinite;
}

@keyframes runnerDepth {
  0% { opacity: 1; }
  18% { opacity: .88; }
  38% { opacity: .72; }
  58% { opacity: .82; }
  78% { opacity: 1; }
  100% { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001s !important;
    animation-iteration-count: 1 !important;
  }
}
</style>
</head>

<body>

<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" aria-label="Stylised aerial running track">

  <!-- deep blue world -->
  <rect class="outer-blue" width="1200" height="900" />

  <!-- large blue infield cutaway -->
  <path
    class="infield"
    d="M-120 900
       C30 670 110 520 210 385
       C330 225 500 105 720 45
       L1330 -90
       L1330 900 Z"
  />

  <!-- track mass -->
  <path
    class="track-red"
    d="M-170 850
       C-20 610 95 430 245 285
       C430 105 655 15 940 -20
       L1210 -50
       L1210 610
       C955 615 760 655 595 760
       C520 808 465 858 420 930
       Z"
  />

  <!-- darker inner sweep -->
  <path
    class="track-red-dark"
    d="M-120 850
       C35 610 145 455 285 330
       C470 165 690 90 950 70
       L1210 52
       L1210 210
       C940 230 745 290 585 420
       C405 565 310 715 235 930
       Z"
  />

  <!-- inner blue void -->
  <path
    class="outer-blue"
    d="M-170 900
       C0 650 115 500 260 390
       C425 265 620 210 875 200
       L1210 190
       L1210 360
       C925 370 720 435 570 570
       C450 678 385 795 340 930
       Z"
  />

  <!-- lane curves -->
  <path class="line" d="M-105 835 C45 610 160 445 315 310 C500 150 705 80 965 55 L1210 38" />
  <path class="thin-line" d="M-45 850 C100 635 205 480 355 350 C535 195 725 130 980 108 L1210 92" />
  <path class="thin-line" d="M15 865 C155 660 255 520 395 390 C570 240 750 180 995 162 L1210 148" />
  <path class="thin-line" d="M75 880 C210 690 310 560 435 430 C600 285 780 230 1010 218 L1210 205" />
  <path class="thin-line" d="M135 895 C270 720 360 595 475 470 C630 330 805 280 1025 274 L1210 262" />
  <path class="thin-line" d="M195 910 C325 750 415 630 515 510 C665 375 830 330 1040 330 L1210 320" />

  <!-- lower straight lane divider hints -->
  <line class="line" x1="430" y1="812" x2="1185" y2="804" />
  <line class="thin-line" x1="478" y1="756" x2="1185" y2="750" />
  <line class="thin-line" x1="528" y1="703" x2="1185" y2="696" />

  <!-- lane tick marks on curve -->
  <line class="mark" x1="520" y1="286" x2="540" y2="306" />
  <line class="mark" x1="602" y1="240" x2="622" y2="260" />
  <line class="mark" x1="690" y1="205" x2="710" y2="225" />
  <line class="mark" x1="785" y1="178" x2="805" y2="198" />

  <!-- lane numbers -->
  <g transform="rotate(-2 760 795)">
    <text class="number" x="680" y="820">1</text>
    <text class="number" x="785" y="817">2</text>
    <text class="number" x="890" y="814">3</text>
    <text class="number" x="995" y="811">4</text>
    <text class="number" x="1100" y="808">5</text>
  </g>

  <!-- finish/start line -->
  <line class="line" x1="610" y1="675" x2="1210" y2="668" />

  <!-- hurdle shadow -->
  <path
    class="shadow"
    d="M930 170
       L1115 310
       L1090 338
       L905 198 Z"
  />

  <!-- hurdle -->
  <g transform="translate(900 105) rotate(34)">
    <rect class="hurdle-white" x="0" y="0" width="150" height="16" rx="2" />
    <rect class="hurdle-dark" x="12" y="16" width="10" height="70" rx="2" />
    <rect class="hurdle-dark" x="128" y="16" width="10" height="70" rx="2" />
    <rect class="hurdle-dark" x="5" y="84" width="52" height="8" rx="2" />
    <rect class="hurdle-dark" x="94" y="84" width="52" height="8" rx="2" />
  </g>

    <!-- PASS 2: hidden lane-one running path -->
  <path
    id="laneOnePath"
    d="M395 435
       C265 535 185 705 118 880
       C92 948 168 985 238 923
       C330 842 405 732 515 625
       C682 462 905 395 1210 384
       C1290 381 1285 245 1205 248
       C872 260 620 340 430 515
       C315 620 240 750 182 900"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    opacity="0"
  />

      <!-- PASS 4: animated runner with stride cycle -->
  <g class="runner-on-path">

    <g class="runner-shadow">
      <ellipse cx="36" cy="60" rx="46" ry="14" />
    </g>

    <g class="runner-body" transform="rotate(90) scale(0.9)">

      <!-- rear arm -->
      <path
        class="limb arm rear-arm"
        d="M-5 -8 C-22 -4 -32 8 -38 22"
        stroke="#06121f"
        stroke-width="9"
        stroke-linecap="round"
        fill="none"
      />

      <!-- rear leg -->
      <path
        class="limb leg rear-leg"
        d="M-2 24 C-18 38 -27 51 -34 68"
        stroke="#06121f"
        stroke-width="10"
        stroke-linecap="round"
        fill="none"
      />

      <!-- front leg -->
      <path
        class="limb leg front-leg"
        d="M5 23 C23 33 35 45 47 60"
        stroke="#06121f"
        stroke-width="10"
        stroke-linecap="round"
        fill="none"
      />

      <!-- torso -->
      <rect
        class="torso"
        x="-12"
        y="-9"
        width="24"
        height="42"
        rx="11"
        fill="#ffb13b"
      />

      <!-- front arm -->
      <path
        class="limb arm front-arm"
        d="M7 -6 C24 -12 36 -21 45 -35"
        stroke="#06121f"
        stroke-width="9"
        stroke-linecap="round"
        fill="none"
      />

      <!-- head -->
      <ellipse
        class="head"
        cx="0"
        cy="-27"
        rx="13"
        ry="14"
        fill="#06121f"
      />

      <!-- shoes -->
      <ellipse
        class="shoe rear-shoe"
        cx="-37"
        cy="72"
        rx="11"
        ry="6"
        fill="#ffe7bf"
      />

      <ellipse
        class="shoe front-shoe"
        cx="51"
        cy="63"
        rx="11"
        ry="6"
        fill="#ffe7bf"
      />

    </g>

    <animateMotion
      dur="9s"
      repeatCount="indefinite"
      rotate="auto"
    >
      <mpath href="#laneOnePath" />
    </animateMotion>

  </g>

  <!-- texture speckles -->
  <g class="texture">
    <circle class="speck" cx="100" cy="720" r="1.4" />
    <circle class="speck" cx="180" cy="650" r="1" />
    <circle class="speck" cx="270" cy="560" r="1.2" />
    <circle class="speck" cx="390" cy="405" r="1" />
    <circle class="speck" cx="520" cy="325" r="1.3" />
    <circle class="speck" cx="710" cy="250" r="1" />
    <circle class="speck" cx="900" cy="190" r="1.2" />
    <circle class="speck" cx="1050" cy="420" r="1.1" />
    <circle class="speck" cx="890" cy="590" r="1" />
    <circle class="speck" cx="730" cy="705" r="1.4" />
    <circle class="speck" cx="580" cy="820" r="1" />

    <circle class="blue-speck" cx="1000" cy="120" r="1.4" />
    <circle class="blue-speck" cx="1080" cy="240" r="1.2" />
    <circle class="blue-speck" cx="100" cy="850" r="1.3" />
    <circle class="blue-speck" cx="280" cy="820" r="1" />
  </g>

  <!-- PASS 5: subtle poster vignette -->
  <rect
    width="1200"
    height="900"
    fill="none"
    stroke="#020914"
    stroke-width="42"
    opacity="0.28"
  />

  <!-- PASS 5: warm sunlight glaze -->
  <path
    d="M720 -80 L1280 -80 L1280 240 C1040 210 850 160 680 45 Z"
    fill="#ffd36f"
    opacity="0.08"
  />

  <!-- PASS 5: extra long editorial shadow from runner zone -->
  <path
    d="M390 430
       C520 500 625 575 730 680
       L695 735
       C570 610 470 530 355 465 Z"
    fill="#06121f"
    opacity="0.22"
  />

</svg>

</body>
</html>
