<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raisin</title>
<style>
:root{
  --bg:#f6efe7;
  --card:#fffaf5;
  --outline:#2f2a28;
  --fur:#c58f57;
  --fur-dark:#9a6b3f;
  --nose:#2f2a28;
  --eye:#1f1f1f;
  --tongue:#ff8a8a;
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}
body{
  min-height:100vh;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:system-ui,sans-serif;
}
.stage{
  width:min(700px,95vw);
  aspect-ratio:1/1;
  background:var(--card);
  border-radius:32px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 20px 60px rgba(0,0,0,.08);
}
svg{
  width:100%;
  height:100%;
  display:block;
}
.label{
  position:absolute;
  top:20px;
  left:20px;
  font-weight:700;
  color:#5d524c;
}
</style>
</head>
<body>
<div class="stage">
<div class="label">
Raisin • Awake
</div>
<svg viewBox="0 0 800 800">
  <!-- shadow -->
  <!-- tail -->
  <g id="tailGroup">
<path
  id="tail"
  d="M560 500
     C650 430,
     680 380,
     660 330"
  fill="none"
  stroke="#9a6b3f"
  stroke-width="34"
  stroke-linecap="round"/>
  </g>
  <!-- body -->
  <!-- chest -->
  <!-- head -->
  <g id="headGroup">
<circle
  cx="400"
  cy="320"
  r="115"
  fill="#c58f57"/>
<!-- ears -->
<ellipse
  id="leftEar"
  cx="320"
  cy="320"
  rx="38"
  ry="95"
  fill="#9a6b3f"/>
<ellipse
  id="rightEar"
  cx="480"
  cy="320"
  rx="38"
  ry="95"
  fill="#9a6b3f"/>
<!-- eyes -->
<ellipse
  id="leftEye"
  cx="360"
  cy="305"
  rx="10"
  ry="16"
  fill="#1f1f1f"/>
<ellipse
  id="rightEye"
  cx="440"
  cy="305"
  rx="10"
  ry="16"
  fill="#1f1f1f"/>
<!-- muzzle -->
<ellipse
  cx="400"
  cy="355"
  rx="55"
  ry="42"
  fill="#e8d4bf"/>
<!-- nose -->
<ellipse
  id="nose"
  cx="400"
  cy="345"
  rx="18"
  ry="12"
  fill="#2f2a28"/>
<!-- mouth -->
<path
  id="mouth"
  d="M385 370
     Q400 382
     415 370"
  fill="none"
  stroke="#2f2a28"
  stroke-width="4"
  stroke-linecap="round"/>
  </g>
</svg>
</div>
<script>
const head =
document.getElementById("headGroup");
const body =
document.getElementById("body");
const tail =
document.getElementById("tailGroup");
const leftEye =
document.getElementById("leftEye");
const rightEye =
document.getElementById("rightEye");
let t = 0;
function animate(){
  t += 0.03;
  // breathing
  const breathe =
    Math.sin(t) * 4;
  body.setAttribute(
    "cy",
    500 + breathe
  );
  head.setAttribute(
    "transform",
    `translate(0 ${breathe * .6})`
  );
  // tail wag
  const wag =
    Math.sin(t * 2.5) * 10;
  tail.setAttribute(
    "transform",
    `rotate(${wag} 560 500)`
  );
  requestAnimationFrame(
    animate
  );
}
animate();
</script>
</body>
</html>
