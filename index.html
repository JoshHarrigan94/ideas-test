<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Runner POV</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #05070d;
}

.stage {
  width: 100vw;
  height: 100vh;
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 28%),
    linear-gradient(180deg, #07101d 0%, #03050a 100%);
}

svg {
  width: min(100vw, 680px);
  height: 100vh;
  display: block;
}

/* CAMERA */
.camera {
  animation: cameraBob 1s ease-in-out infinite;
  transform-origin: 50% 82%;
}

/* TRACK */
.track {
  fill: #0f172a;
}

.track-grain circle {
  fill: rgba(255,255,255,.16);
}

.lane-line {
  stroke: #f8fafc;
  stroke-width: 3;
  stroke-linecap: round;
  opacity: .82;
}

.track-move {
  animation: trackMove 1s linear infinite;
}

.cross-line {
  stroke: #f8fafc;
  stroke-width: 4;
  opacity: .9;
  animation: crossLine 2s linear infinite;
}

/* FEET */
.foot {
  transform-origin: center;
}

.left-foot {
  animation: leftStride 1s ease-in-out infinite;
}

.right-foot {
  animation: rightStride 1s ease-in-out infinite;
}

.shoe {
  fill: #ff6b35;
}

.shoe-side {
  fill: #c94422;
}

.sole {
  fill: #f8fafc;
}

.sock {
  fill: #e8c8aa;
}

.lace {
  stroke: rgba(15, 23, 42, .38);
  stroke-width: 4;
  stroke-linecap: round;
}

.foot-shadow {
  fill: rgba(0,0,0,.42);
  filter: blur(5px);
  transform-origin: center;
}

.left-shadow {
  animation: leftShadow 1s ease-in-out infinite;
}

.right-shadow {
  animation: rightShadow 1s ease-in-out infinite;
}

/* ANIMATION */
@keyframes cameraBob {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(8px) scale(1.01); }
}

@keyframes trackMove {
  from { transform: translateY(-190px); }
  to { transform: translateY(190px); }
}

@keyframes crossLine {
  0% {
    transform: translateY(-260px) scaleX(.45);
    opacity: 0;
  }
  15% {
    opacity: .75;
  }
  70% {
    opacity: .75;
  }
  100% {
    transform: translateY(440px) scaleX(1.6);
    opacity: 0;
  }
}

@keyframes leftStride {
  0% {
    transform: translate(160px, 386px) rotate(-9deg) scale(1.18);
    opacity: 1;
  }
  25% {
    transform: translate(148px, 315px) rotate(-5deg) scale(1.02);
    opacity: .95;
  }
  50% {
    transform: translate(138px, 245px) rotate(1deg) scale(.84);
    opacity: .72;
  }
  75% {
    transform: translate(126px, 178px) rotate(5deg) scale(.62);
    opacity: .18;
  }
  100% {
    transform: translate(160px, 386px) rotate(-9deg) scale(1.18);
    opacity: 1;
  }
}

@keyframes rightStride {
  0% {
    transform: translate(294px, 178px) rotate(5deg) scale(.62);
    opacity: .18;
  }
  25% {
    transform: translate(282px, 245px) rotate(1deg) scale(.84);
    opacity: .72;
  }
  50% {
    transform: translate(272px, 315px) rotate(-5deg) scale(1.02);
    opacity: .95;
  }
  75% {
    transform: translate(260px, 386px) rotate(-9deg) scale(1.18);
    opacity: 1;
  }
  100% {
    transform: translate(294px, 178px) rotate(5deg) scale(.62);
    opacity: .18;
  }
}

@keyframes leftShadow {
  0% { transform: translate(164px, 478px) scale(1.2); opacity: .38; }
  50% { transform: translate(142px, 310px) scale(.74); opacity: .15; }
  100% { transform: translate(164px, 478px) scale(1.2); opacity: .38; }
}

@keyframes rightShadow {
  0% { transform: translate(298px, 310px) scale(.74); opacity: .15; }
  50% { transform: translate(266px, 478px) scale(1.2); opacity: .38; }
  100% { transform: translate(298px, 310px) scale(.74); opacity: .15; }
}
</style>
</head>

<body>
<main class="stage">

<svg viewBox="0 0 420 620" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="clip">
      <rect x="0" y="0" width="420" height="620" rx="0"/>
    </clipPath>

    <radialGradient id="trackLight" cx="50%" cy="38%" r="78%">
      <stop offset="0%" stop-color="#17233d"/>
      <stop offset="100%" stop-color="#07101d"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#clip)" class="camera">

    <!-- track base -->
    <path class="track" d="M-90 620 L110 0 H310 L510 620 Z" />
    <path fill="url(#trackLight)" d="M-90 620 L110 0 H310 L510 620 Z" opacity=".85"/>

    <!-- track grain -->
    <g class="track-grain">
      <circle cx="80" cy="70" r="1"/>
      <circle cx="190" cy="110" r="1.2"/>
      <circle cx="315" cy="80" r="1"/>
      <circle cx="110" cy="210" r="1.1"/>
      <circle cx="260" cy="235" r="1"/>
      <circle cx="340" cy="340" r="1.4"/>
      <circle cx="72" cy="430" r="1"/>
      <circle cx="210" cy="485" r="1.2"/>
      <circle cx="315" cy="525" r="1"/>
      <circle cx="145" cy="570" r="1"/>
    </g>

    <!-- moving lane structure -->
    <g class="track-move">
      <line class="lane-line" x1="115" y1="-200" x2="-88" y2="620"/>
      <line class="lane-line" x1="305" y1="-200" x2="508" y2="620"/>

      <line class="cross-line" x1="125" y1="0" x2="295" y2="0"/>
      <line class="cross-line" x1="125" y1="-260" x2="295" y2="-260" style="animation-delay:-1s"/>
    </g>

    <!-- soft centre shadow -->
    <ellipse cx="210" cy="560" rx="150" ry="44" fill="rgba(0,0,0,.28)" filter="blur(16px)"/>

    <!-- shadows -->
    <ellipse class="foot-shadow left-shadow" cx="0" cy="0" rx="42" ry="16"/>
    <ellipse class="foot-shadow right-shadow" cx="0" cy="0" rx="42" ry="16"/>

    <!-- LEFT FOOT -->
    <g class="foot left-foot">
      <ellipse class="sock" cx="0" cy="-42" rx="21" ry="31"/>
      <path class="shoe" d="M-35 -10 C-38 38 -27 88 0 104 C27 88 38 38 35 -10 C28 -42 -28 -42 -35 -10Z"/>
      <path class="shoe-side" d="M0 -36 C23 -30 32 -8 30 28 C26 65 14 88 0 104 C11 50 9 5 0 -36Z" opacity=".45"/>
      <path class="sole" d="M-31 72 C-20 104 20 104 31 72 L27 99 C17 122 -17 122 -27 99Z"/>
      <line class="lace" x1="-17" y1="8" x2="17" y2="22"/>
      <line class="lace" x1="-18" y1="30" x2="18" y2="44"/>
    </g>

    <!-- RIGHT FOOT -->
    <g class="foot right-foot">
      <ellipse class="sock" cx="0" cy="-42" rx="21" ry="31"/>
      <path class="shoe" d="M-35 -10 C-38 38 -27 88 0 104 C27 88 38 38 35 -10 C28 -42 -28 -42 -35 -10Z"/>
      <path class="shoe-side" d="M0 -36 C23 -30 32 -8 30 28 C26 65 14 88 0 104 C11 50 9 5 0 -36Z" opacity=".45"/>
      <path class="sole" d="M-31 72 C-20 104 20 104 31 72 L27 99 C17 122 -17 122 -27 99Z"/>
      <line class="lace" x1="-17" y1="8" x2="17" y2="22"/>
      <line class="lace" x1="-18" y1="30" x2="18" y2="44"/>
    </g>

  </g>
</svg>

</main>
</body>
</html>
